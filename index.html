<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS Free Classroom — Prototype v2</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --border: #333;
    --text: #e8e8e8;
    --text-muted: #999;
    --text-dim: #666;
    --accent: #4f8fff;
    --accent-hover: #6ba1ff;
    --green: #34d399;
    --orange: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --gold: #fbbf24;
    --sidebar-w: 320px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .sidebar-header .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .sidebar-header .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 8px;
  }

  .sidebar-actions {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tracker-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 8px 12px;
    background: linear-gradient(135deg, #1a2d1a 0%, #1a2744 100%);
    border: 1px solid rgba(79, 143, 255, 0.25);
    border-radius: 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .tracker-btn:hover {
    border-color: var(--accent);
    background: linear-gradient(135deg, #1a2d1a 0%, #1a3055 100%);
  }

  .tracker-btn .tracker-icon { font-size: 14px; }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .sidebar-nav::-webkit-scrollbar { width: 6px; }
  .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .module-group { margin-bottom: 4px; }

  .module-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }

  .module-header:hover { background: var(--surface2); }

  .module-header .module-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .module-header .module-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .module-header .module-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .module-badge.reward {
    background: rgba(251, 191, 36, 0.15);
    color: var(--gold);
    border: 1px solid rgba(251, 191, 36, 0.3);
  }

  .module-badge.paid {
    background: rgba(167, 139, 250, 0.15);
    color: var(--purple);
    border: 1px solid rgba(167, 139, 250, 0.3);
  }

  .module-header .module-count {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface3);
    padding: 1px 7px;
    border-radius: 8px;
  }

  .module-header .chevron {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .module-group.open .chevron { transform: rotate(90deg); }

  .module-lessons {
    display: none;
    padding: 0 0 4px 0;
  }

  .module-group.open .module-lessons { display: block; }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px 7px 54px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .lesson-item:hover { background: var(--surface2); color: var(--text); }
  .lesson-item.active { background: var(--surface3); color: var(--accent); }

  .lesson-item .lesson-num {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 18px;
    flex-shrink: 0;
  }

  .lesson-item .lesson-label {
    flex: 1;
  }

  .lesson-item .level-pip {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .level-pip.beginner { background: rgba(52, 211, 153, 0.15); color: var(--green); }
  .level-pip.beginner-plus { background: rgba(52, 211, 153, 0.15); color: #5ee6b5; }
  .level-pip.intermediate { background: rgba(79, 143, 255, 0.15); color: var(--accent); }
  .level-pip.intermediate-plus { background: rgba(167, 139, 250, 0.15); color: var(--purple); }
  .level-pip.advanced { background: rgba(239, 68, 68, 0.15); color: var(--red); }
  .level-pip.coming-soon { background: rgba(102, 102, 102, 0.2); color: var(--text-dim); }

  .phase-divider {
    padding: 16px 16px 6px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }

  /* ── Main Content ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .main::-webkit-scrollbar { width: 8px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .lesson-view {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 48px 80px;
  }

  .lesson-breadcrumb {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .lesson-breadcrumb span { color: var(--text-muted); }

  .lesson-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
    line-height: 1.25;
  }

  .lesson-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .meta-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 500;
  }

  .meta-tag.id { background: var(--surface3); color: var(--text-muted); }
  .meta-tag.level { background: #1a2744; color: var(--accent); }
  .meta-tag.video { background: #1f2d1a; color: var(--green); }
  .meta-tag.template { background: #2d2a1a; color: var(--orange); }
  .meta-tag.guide { background: #2a1a2d; color: var(--purple); }
  .meta-tag.coming-soon { background: #2e2e2e; color: var(--text-dim); border: 1px dashed var(--text-dim); }
  .meta-tag.reward { background: rgba(251, 191, 36, 0.1); color: var(--gold); }

  .video-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 32px;
    border: 1px solid var(--border);
  }

  .video-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 0;
  }

  .video-thumb {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    text-decoration: none;
  }

  .video-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.2s, filter 0.2s;
  }

  .video-thumb:hover img {
    transform: scale(1.03);
    filter: brightness(0.7);
  }

  .video-thumb .play-btn {
    position: absolute;
    width: 72px; height: 50px;
    background: rgba(255,0,0,0.85);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .video-thumb:hover .play-btn {
    background: rgba(255,0,0,1);
    transform: scale(1.08);
  }

  .play-btn::after {
    content: '';
    display: block;
    width: 0; height: 0;
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent #fff;
    margin-left: 3px;
  }

  .video-placeholder {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    color: var(--text-dim);
  }

  .video-placeholder .play-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .video-placeholder span { font-size: 14px; }

  .content-section {
    margin-bottom: 32px;
  }

  .content-section h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .content-section h2 .section-icon {
    font-size: 16px;
  }

  .content-section p {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .content-section ul {
    list-style: none;
    padding: 0;
  }

  .content-section ul li {
    position: relative;
    padding: 8px 0 8px 24px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-muted);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .content-section ul li:last-child { border-bottom: none; }

  .content-section ul li::before {
    content: '\2192';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 600;
  }

  .content-section.takeaways ul li::before { content: '\2726'; color: var(--green); }
  .content-section.actions ul li::before { content: '\2610'; color: var(--orange); }

  .callout {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 16px 20px;
    margin: 20px 0;
  }

  .callout.proof {
    border-left-color: var(--green);
  }

  .callout.reward {
    border-left-color: var(--gold);
    background: rgba(251, 191, 36, 0.05);
  }

  .callout p {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-muted);
    margin: 0;
  }

  .callout strong { color: var(--text); }

  .next-step-card {
    background: linear-gradient(135deg, #1a2744 0%, #1a1a2e 100%);
    border: 1px solid rgba(79, 143, 255, 0.2);
    border-radius: 12px;
    padding: 24px;
    margin-top: 32px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .next-step-card:hover { border-color: var(--accent); }

  .next-step-card .next-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .next-step-card .next-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  .resource-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .resource-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .resource-card:hover { border-color: var(--accent); }

  .resource-card .rc-icon { font-size: 24px; margin-bottom: 8px; }
  .resource-card .rc-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .resource-card .rc-name { font-size: 14px; font-weight: 600; color: var(--text); }

  /* ── Welcome/Landing View ── */
  .welcome-view {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 48px;
    text-align: center;
  }

  .welcome-view h1 {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff 0%, #999 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome-view .welcome-sub {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 560px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 16px;
  }

  .stat-card .stat-num {
    font-size: 32px;
    font-weight: 800;
    color: var(--accent);
  }

  .stat-card .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .roadmap {
    text-align: left;
    margin-top: 48px;
  }

  .roadmap h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
    text-align: center;
  }

  .roadmap-phase {
    margin-bottom: 32px;
  }

  .roadmap-phase h3 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .roadmap-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .roadmap-item:hover { border-color: var(--accent); background: var(--surface2); }

  .roadmap-item .ri-num {
    width: 32px; height: 32px;
    background: var(--surface3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .roadmap-item .ri-name { font-size: 15px; font-weight: 600; flex: 1; }
  .roadmap-item .ri-count { font-size: 12px; color: var(--text-dim); }
  .roadmap-item .ri-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Category headers in template library ── */
  .category-header {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin: 32px 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .category-header:first-child { margin-top: 0; }

  .template-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .template-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .template-card:hover { border-color: var(--accent); }

  .template-card .tc-id { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .template-card .tc-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .template-card .tc-level { font-size: 12px; color: var(--accent); }

  /* ── Reward banner ── */
  .reward-banner {
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.08) 0%, rgba(251, 191, 36, 0.02) 100%);
    border: 1px solid rgba(251, 191, 36, 0.25);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .reward-banner .reward-icon { font-size: 24px; }
  .reward-banner .reward-text { flex: 1; }
  .reward-banner .reward-title { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 2px; }
  .reward-banner .reward-desc { font-size: 12px; color: var(--text-muted); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .sidebar { width: 260px; min-width: 260px; }
    .lesson-view { padding: 24px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>AI Automation Society</h1>
    <div class="subtitle">Free Classroom</div>
    <span class="badge">PROTOTYPE v2</span>
  </div>
  <div class="sidebar-actions">
    <button class="tracker-btn" onclick="alert('Download the Progress Tracker spreadsheet to track your 7-Day Challenge completion!')">
      <span class="tracker-icon">&#128202;</span> Download Progress Tracker
    </button>
  </div>
  <div class="sidebar-nav" id="sidebar-nav"></div>
</div>

<div class="main" id="main-content"></div>

<script>
// =====================================================
// DATA - All modules with new structure
// =====================================================

const MODULES = [
  {
    id: 'start-here',
    name: 'Start Here',
    icon: '\uD83D\uDCCD',
    iconBg: '#2d1a1a',
    section: 'getting-started',
    lessons: [
      {
        id: 'SH-001', title: 'Community Rules & Guidelines', level: 'Start', videoType: 'loom',
        hasTemplate: false, hasGuide: false,
        summary: '<p>Welcome to the AI Automation Society. This is the most important lesson in the entire community because it sets the foundation for how we operate. Watch the Loom walkthrough to understand our community standards, how we treat each other, and what\'s expected of you as a member.</p><p>This isn\'t a passive content library \u2014 it\'s an active community of builders. The rules exist to keep things productive, respectful, and focused so everyone can learn faster and build real things.</p>',

      {

        summary: '<p>Every builder gets stuck. The difference between people who stay stuck and people who break through is knowing how to ask the right question. This lesson shows you exactly how to request help inside the community so you get fast, useful answers.</p><p>A good help request includes what you\'re building, what you\'ve tried, where you\'re stuck, and a screenshot or error message. The more specific your question, the faster someone can help you.</p>',

        nextStep: 'Move to Lesson 3: Introduce Yourself'
      },
      {
        id: 'SH-003', title: 'Introduce Yourself', level: 'Start', videoType: 'loom',
        hasTemplate: false, hasGuide: false,
        summary: '<p>Before you start building, take 60 seconds to introduce yourself. Tell us who you are, what brought you here, and what you want to build or achieve with AI automation.</p><p>The members who introduce themselves and engage early are consistently the ones who get the most value out of this community.</p>',

        nextStep: 'Move to Lesson 4: AI Isn\'t Hard. It\'s Misunderstood.'
      },
      {
        id: 'BN-009', title: 'AI Isn\'t Hard. It\'s Misunderstood.', level: 'Beginner \u2192 Intermediate',
        youtube: 'ip8FEYOQob0', hasTemplate: false, hasGuide: true,
        summary: '<p>Most people overcomplicate AI. They chase every new tool, try to build overly complex systems, and burn out before making a dollar. This lesson reframes how you should think about AI automation \u2014 with an emphasis on leverage, simplicity, and process-first thinking.</p><p>The core idea: understand the business problem before you touch any tool. AI automation isn\'t about building the flashiest agent \u2014 it\'s about finding a process that wastes time or money, and eliminating that waste with a simple, reliable workflow.</p>',

        nextStep: 'Move to Lesson 5: How I\'d Learn n8n in 2026'
      },
      {

              { id: 'CH-103', title: 'The Claude Code Build Loop', type: 'lesson', youtube: null, description: 'Every project you build with Claude Code follows the same loop: Describe \u2192 Generate \u2192 Review \u2192 Iterate. You describe what you want in plain English. Claude generates the code and creates files. You review the output and test it. Then you iterate \u2014 ask Claude to fix issues, add features, or refactor. This loop is the core skill of the entire challenge. The better you get at describing what you want and reviewing what Claude produces, the faster and better your builds become. Today we practice this loop on a simple project so it becomes second nature.' }

              { id: 'CH-202', title: 'Giving Claude Code Context That Matters', type: 'lesson', youtube: null, description: 'The #1 thing that separates good Claude Code users from great ones is context. Today we cover: (1) How to describe your project\'s purpose, not just its features. (2) How to reference existing files so Claude builds on what exists instead of starting over. (3) How to share error messages so Claude can debug effectively. (4) How to describe the "why" behind a feature so Claude makes better architectural decisions. The pattern: "I\'m building [purpose]. I have [existing context]. I want to add [feature] because [reason]." This framing consistently produces better code than just saying "build X."' },
              { id: 'CH-203', title: 'Iterative Building: Start Simple, Then Layer', type: 'lesson', youtube: null, description: 'A common mistake: trying to describe your entire application in one massive prompt. That produces worse results than building iteratively. The right approach: (1) Start with the simplest possible version. "Build a script that takes a URL and returns a summary." (2) Test it and confirm it works. (3) Add one feature at a time. "Now add the ability to save summaries to a file." (4) Refactor when needed. "The code is getting messy \u2014 refactor into separate modules." Each iteration is small, testable, and builds on confirmed working code. This is how professional developers work with AI coding tools.' }

              { id: 'CH-301', title: 'CLAUDE.md: Your Project\'s Brain', type: 'lesson', youtube: null, description: 'CLAUDE.md is a file you put in your project root that Claude Code reads automatically at the start of every session. It\'s your project\'s persistent memory. Inside it, you describe: what the project does, its tech stack, coding conventions, file structure, and any rules Claude should follow (like "always use TypeScript" or "never modify the database schema without asking"). Without CLAUDE.md, every Claude Code session starts from zero. With it, Claude picks up exactly where you left off and follows your project\'s patterns. Write one for every project. This is the single biggest productivity multiplier in Claude Code.' },
              { id: 'CH-302', title: 'Prompt Patterns That Work', type: 'lesson', youtube: null, description: 'Three patterns that consistently produce the best output: (1) Outcome-First: "I want users to be able to [outcome]. Build [feature] that achieves this." Better than describing implementation steps. (2) Constraint-Based: "Build X, but it must be under 200 lines, use no external dependencies, and handle these 3 edge cases." Constraints make Claude more precise. (3) Example-Driven: "Here\'s an example of the input and expected output. Build something that produces this result." Examples eliminate ambiguity. Practice all three today \u2014 you\'ll develop a feel for which pattern fits which situation.' },
              { id: 'CH-303', title: 'Multi-File Projects & Code Organization', type: 'lesson', youtube: null, description: 'Up to now, your projects might be single files. Real applications have multiple files: routes, models, utilities, configs, tests. Here\'s how to work with Claude Code on multi-file projects: (1) Start by asking Claude to scaffold the project structure. (2) Build one module at a time. (3) When adding features, tell Claude which files are involved. (4) Use CLAUDE.md to document the file structure so Claude always knows where things are. The key insight: Claude Code navigates your codebase by reading your files. The better organized your code is, the better Claude performs when modifying it.' }

              { id: 'CH-305', title: 'Create Your First CLAUDE.md', type: 'build', youtube: null, description: 'Take your Day 2 project and add a CLAUDE.md file. Include: project name and purpose, tech stack, file structure, coding conventions, and any rules for Claude to follow. Then start a new Claude Code session in that project directory and ask Claude to add a feature. Notice how it already understands the project context. This is the "aha" moment where CLAUDE.md clicks. From today forward, every project you build should start with a CLAUDE.md file.' }

              { id: 'CH-307', title: 'Debugging with Claude Code', type: 'lesson', youtube: null, description: 'When something breaks, Claude Code is your best debugging partner. The pattern: (1) Run your code and get the error. (2) Paste the full error message into Claude Code. (3) Ask: "This error occurred when I tried to [action]. Diagnose the root cause and fix it." Claude will read the relevant files, trace the error, and apply a fix. For stubborn bugs, add more context: "I\'ve already tried [X] and [Y] but the error persists." The more context you give about what you\'ve tried, the faster Claude finds the actual issue.' }

              { id: 'CH-401', title: 'Claude Code for Full-Stack Development', type: 'lesson', youtube: null, description: 'Today is where things get serious. Claude Code can scaffold and build complete web applications: React or Next.js frontends, Express or FastAPI backends, database connections, authentication, and deployment configs. The key: describe the application like a product spec, not a technical doc. "Build a bookmark manager where users can save URLs, add tags, search by tag, and see their most recent bookmarks on a dashboard." Claude Code will choose the right stack, create the project structure, and build each piece. Your job is to guide the architecture and test the result.' },

            items: [
              { id: 'CH-404', title: 'Project: Build a Full-Stack Dashboard App', type: 'build', youtube: null, description: 'Your main build today: a complete web application with frontend, backend, and database. Tell Claude Code: "Build a personal dashboard app using Next.js. Features: (1) A habit tracker where I can add habits and check them off daily. (2) A notes section with markdown support. (3) A simple analytics page showing my habit completion rate over time. Use SQLite for the database and Tailwind CSS for styling." Build iteratively: scaffold first, then habits, then notes, then analytics. By the end you have a real, usable application. Estimated time: 60\u201390 minutes.' },
              { id: 'CH-405', title: 'Alternate Build: SaaS Landing Page with Auth', type: 'build', youtube: null, description: 'Build a professional SaaS landing page with user authentication. Tell Claude Code: "Build a landing page for a SaaS product called \'FocusFlow\' \u2014 an AI productivity tool. Include: hero section, features grid, pricing table (free/pro/enterprise), testimonials section, and a sign-up page with email/password authentication using NextAuth.js. Make it mobile responsive with a modern design." This teaches full-stack in a different direction \u2014 marketing pages and auth flows, which are essential for any product you want to launch.' },
              { id: 'CH-406', title: 'Alternate Build: API with Documentation', type: 'build', youtube: null, description: 'Build a REST API that other developers could use. Tell Claude Code: "Build a REST API for a recipe management system using Express and SQLite. Endpoints: CRUD for recipes (title, ingredients, instructions, tags, prep time), search by ingredient or tag, and a random recipe endpoint. Include auto-generated API documentation using Swagger/OpenAPI." This teaches API design, documentation generation, and building for other developers \u2014 a valuable skill for freelance work.' }
            ]
          },
          {
            name: 'Go Deeper',
            items: [
              { id: 'CH-407', title: 'Deploying Your App to Vercel', type: 'lesson', youtube: null, description: 'A local app is a demo. A deployed app is a product. Tell Claude Code: "Configure this project for deployment on Vercel. Add a vercel.json if needed, make sure environment variables are properly handled, and create a README with deployment instructions." Then push to GitHub and deploy. The whole process takes about 10 minutes with Claude Code handling the config. After this, you can share a live URL instead of a screenshot.' },
              { id: 'CH-408', title: 'Adding Real-Time Features', type: 'lesson', youtube: null, description: 'Want to make your app feel modern? Tell Claude Code: "Add real-time updates to [feature] using WebSockets" or "Add optimistic UI updates so the interface feels instant." Real-time features (live updating dashboards, instant notifications, collaborative editing) are the kind of polish that turns a project into something people want to use daily. Claude Code handles WebSocket setup, Socket.io integration, and state management well.' }
            ]
          },
          {
            name: 'Checkpoint',
            items: [
              { id: 'CH-409', title: 'Day 4 Knowledge Check', type: 'quiz', youtube: null, description: '(1) Why should you write a product spec in CLAUDE.md before building a full-stack app? (2) How do you describe a data model to Claude Code? (3) What\'s the difference between SQLite and Postgres, and when would you use each? (4) Why is deploying important even for a personal project? (5) What makes the "Product Spec Approach" better than just telling Claude Code to "build an app"? Answers in expandable sections.' },
              { id: 'CH-410', title: 'Share Your Day 4 Build', type: 'action', youtube: null, description: 'This is the most impressive day so far. Post: (1) A screenshot or screen recording of your full-stack app. (2) The tech stack Claude Code chose (or you specified). (3) A live URL if you deployed it. (4) Your CLAUDE.md product spec. Tag #Day4. These posts are portfolio-worthy \u2014 save the link.' }
            ]
          }
        ]

      {
        day: 5, title: 'RAG & AI Agent Systems', icon: '\uD83D\uDCDA', color: '#06b6d4',
        subtitle: 'Build AI that answers questions from your own documents and takes actions autonomously',
        sections: [
          {
            name: 'Learn',
            items: [
              { id: 'CH-501', title: 'What is RAG and Why Every Business Wants It', type: 'lesson', youtube: null, description: 'RAG stands for Retrieval-Augmented Generation. In plain English: instead of the AI making things up from training data, it first searches YOUR documents for relevant information, then generates a response based on what it found. This is behind every "chat with your docs" tool, every custom knowledge base, every internal Q&A bot. Why it matters commercially: every business has documents (SOPs, policies, product specs, training materials) that employees spend hours searching through. A RAG app that answers questions from those documents saves real time and money. AIS+ members consistently report RAG builds as their highest-paying projects.' },
              { id: 'CH-502', title: 'The RAG Pipeline: How It Works', type: 'lesson', youtube: null, description: 'A RAG system has five steps: (1) Ingestion \u2014 loading documents (PDFs, text files, web pages) into your system. (2) Chunking \u2014 splitting documents into smaller pieces so the AI can find specific information. (3) Embedding \u2014 converting each chunk into a mathematical vector that represents its meaning. (4) Storage \u2014 saving those vectors in a vector database. (5) Query \u2014 when a user asks a question, find the most relevant chunks, feed them to an LLM, and generate an answer. Claude Code can build this entire pipeline for you. You describe what you want, it writes the ingestion scripts, embedding logic, database connections, and query API.' },
              { id: 'CH-503', title: 'Choosing a Vector Database', type: 'lesson', youtube: null, description: 'Vector databases store your document embeddings. Options for this challenge: (1) Chroma \u2014 lightweight, runs locally, zero setup, great for learning. Tell Claude Code: "Use Chroma for the vector store." (2) Pinecone \u2014 managed cloud service, free tier, good for production. (3) Supabase pgvector \u2014 Postgres-based, good if you\'re already using Supabase. For today\'s build, we recommend Chroma (simplest) or Pinecone (most production-ready). You can always migrate later \u2014 the core RAG logic stays the same regardless of which vector DB you use.' }
            ]
          },
          {
            name: 'Build',
            items: [
              { id: 'CH-504', title: 'Project: Chat With Your Documents', type: 'build', youtube: null, description: 'Your main build today: a web app where you upload documents and ask questions about them. Tell Claude Code: "Build a \'Chat With Your Docs\' web app. Features: (1) Upload PDF or text files through a web interface. (2) Process and chunk the documents, then store embeddings in a Chroma vector database. (3) A chat interface where users ask questions and get AI-generated answers that cite which document and section the answer came from. Use Express for the backend, a clean React frontend, and the OpenAI API for embeddings and generation." Build iteratively: ingestion first, then storage, then query, then the chat UI. Estimated time: 60\u201390 minutes.' },
              { id: 'CH-505', title: 'Alternate Build: Research Assistant Agent', type: 'build', youtube: null, description: 'Build an AI agent that researches topics by searching the web and synthesizing results. Tell Claude Code: "Build a research assistant that takes a topic, searches for relevant information using web scraping, stores the findings, and produces a comprehensive research report with sources cited. Include a web UI where I can enter a topic and see the report generate in real-time." This teaches the agent pattern: an AI that decides its own steps based on the task, rather than following a fixed pipeline.' },
              { id: 'CH-506', title: 'Alternate Build: Q&A Bot for a Specific Knowledge Base', type: 'build', youtube: null, description: 'Build a Q&A bot focused on a specific domain. Pick something you know well \u2014 a framework\'s documentation, your company\'s wiki, or a textbook. Tell Claude Code: "Build a Q&A bot that ingests [these documents] and answers questions accurately, citing specific sections. If the answer isn\'t in the documents, it should say \'I don\'t have information about that\' instead of making something up." The "don\'t hallucinate" constraint is what makes RAG valuable \u2014 practice getting this right.' }
            ]
          },
          {
            name: 'Go Deeper',
            items: [
              { id: 'CH-507', title: 'Chunking Strategies That Matter', type: 'lesson', youtube: null, description: 'How you split documents affects answer quality dramatically. The default (split every N characters) works but isn\'t optimal. Better approaches: (1) Split by paragraph or section \u2014 preserves meaning within chunks. (2) Overlapping chunks \u2014 include some overlap between chunks so context isn\'t lost at boundaries. (3) Semantic chunking \u2014 use AI to identify natural topic boundaries. Tell Claude Code: "Refactor my chunking to use paragraph-level splitting with 50-token overlap." Then test the same questions and compare answer quality.' },
              { id: 'CH-508', title: 'Adding Memory to Your AI', type: 'lesson', youtube: null, description: 'Basic RAG answers one question at a time. With memory, your AI can reference previous questions in the conversation. "You mentioned earlier that..." Tell Claude Code: "Add conversation memory to my Q&A bot. Store the last 10 messages and include them as context in each query so the AI can reference previous questions and answers." This makes the experience feel like talking to someone who actually knows your documents and remembers what you\'ve discussed.' },
              { id: 'CH-509', title: 'Evaluating RAG Quality', type: 'lesson', youtube: null, description: 'How do you know if your RAG system is giving good answers? Build an evaluation: create 10 questions where you know the correct answer, run them through your system, and score accuracy. Tell Claude Code: "Build a RAG evaluation script. I\'ll provide question-answer pairs. The script should run each question through the RAG pipeline, compare the generated answer to the expected answer, and produce an accuracy report." This is how you tune your system: change chunking, change the prompt, change the model, and measure the impact.' }
            ]
          },
          {
            name: 'Checkpoint',
            items: [
              { id: 'CH-510', title: 'Day 5 Knowledge Check', type: 'quiz', youtube: null, description: '(1) What are the five steps of a RAG pipeline? (2) Why does chunking strategy affect answer quality? (3) What should a RAG system do when the answer isn\'t in the documents? (4) What\'s the difference between a RAG system and a regular chatbot? (5) Why is RAG one of the highest-value skills in AI right now? Answers in expandable sections.' },
              { id: 'CH-511', title: 'Share Your Day 5 Build', type: 'action', youtube: null, description: 'Post your RAG app with: (1) What documents you loaded. (2) A question you asked and the answer it returned. (3) Whether the answer was accurate and cited the right source. (4) Your vector database choice and why. Tag #Day5. RAG builds are the most impressive to potential clients \u2014 save this for your portfolio.' }
            ]
          }
        ]
      },
      {
        day: 6, title: 'Complex Multi-Component Projects', icon: '\u2699\uFE0F', color: '#ec4899',
        subtitle: 'Build real-world applications with multiple services, APIs, and integrations',
        sections: [
          {
            name: 'Learn',
            items: [
              { id: 'CC-NEW-09', title: 'Claude Code Executive Assistant', type: 'video', youtube: null, description: 'Nate builds a full AI executive assistant using Claude Code \u2014 an agent that handles email, scheduling, research, and task management. This is a real-world multi-component system you can model your Day 6 build on.' },
              { id: 'CC-NEW-10', title: 'Watch My AI Agents Work in Real Time', type: 'video', youtube: null, description: 'See Nate\'s AI agents running live \u2014 multiple components communicating, making decisions, and completing tasks autonomously. Great context for understanding how multi-agent systems work in practice before you build your own today.' },
              { id: 'CC-NEW-11', title: 'Claude Code Remote Control', type: 'video', youtube: null, description: 'Learn how to use Claude Code remotely \u2014 controlling builds, deploying projects, and managing code from anywhere. Essential for production workflows where you need to manage multiple services and deployments.' },
              { id: 'CH-601', title: 'Thinking in Systems, Not Scripts', type: 'lesson', youtube: null, description: 'Up to now, you\'ve been building single applications. Real-world projects are often systems \u2014 multiple components that work together. An API that serves data. A frontend that displays it. A background job that processes things. A webhook that receives events from external services. Today you learn to build these multi-component systems with Claude Code. The approach: describe the system architecture in CLAUDE.md, then build each component one at a time, connecting them as you go. Claude Code handles the complexity of making components talk to each other if you describe the interfaces clearly.' },
              { id: 'CH-602', title: 'API Design Patterns', type: 'lesson', youtube: null, description: 'Every multi-component system needs well-designed APIs. Three patterns that cover 90% of use cases: (1) REST \u2014 standard request/response. Tell Claude Code: "Build a REST API with these endpoints." Best for CRUD operations. (2) Webhooks \u2014 event-driven notifications. "When X happens, POST to this URL." Best for integrations with external services. (3) Background Jobs \u2014 async processing. "Queue this task and process it in the background." Best for long-running operations. Claude Code knows all three patterns well. Your job is to pick the right pattern for each piece of your system.' },
              { id: 'CH-603', title: 'Working with External Services', type: 'lesson', youtube: null, description: 'Real applications integrate with external services: Stripe for payments, SendGrid for email, Twilio for SMS, Slack for notifications, GitHub for code, etc. Claude Code can build these integrations fast because it knows the SDKs and API patterns. The approach: "Integrate Stripe for payment processing. When a user submits payment, create a Stripe checkout session, handle the success webhook, and update the user\'s subscription status in the database." Claude Code writes the integration code, webhook handlers, and error handling. Today you\'ll practice building with at least one external service integration.' }
            ]
          },
          {
            name: 'Build',
            items: [
              { id: 'CH-604', title: 'Project: Multi-Service Application', type: 'build', youtube: null, description: 'Your main build today: a multi-component application with at least 3 connected parts. Choose one: (A) "Build a lead capture system: a landing page form, an Express API that stores submissions in SQLite, a background job that enriches leads using an AI API (classify industry, estimate company size), and a Slack webhook that notifies me of new high-priority leads." (B) "Build a content scheduling tool: a dashboard where I write posts, an API that stores them with scheduled dates, a cron job that publishes posts at the scheduled time, and an analytics endpoint that tracks which posts performed best." Pick one or invent your own. The key is building something with multiple connected components. Estimated time: 75\u2013120 minutes.' },
              { id: 'CH-605', title: 'Alternate Build: Slack Bot', type: 'build', youtube: null, description: 'Build an AI-powered Slack bot. Tell Claude Code: "Build a Slack bot using the Slack Bolt framework. The bot should: (1) respond to direct messages with AI-generated answers, (2) summarize long threads when someone types /summarize, (3) create action items from a thread when someone types /actions, and (4) maintain conversation context within each channel." This is a real product that many companies would pay for. The Slack SDK is well-known by Claude Code, so it handles the integration smoothly.' },
              { id: 'CH-606', title: 'Alternate Build: Chrome Extension', type: 'build', youtube: null, description: 'Build a Chrome extension with an AI backend. Tell Claude Code: "Build a Chrome extension that: (1) adds a button to any webpage, (2) when clicked, sends the page content to a backend API, (3) the backend uses AI to generate a summary, key points, and action items, (4) displays the results in a popup overlay on the page. Build both the extension and the API backend." Chrome extensions are impressive portfolio pieces and demonstrate you can build beyond just web apps.' }
            ]
          },
          {
            name: 'Go Deeper',
            items: [
              { id: 'CH-607', title: 'Testing Your Code with Claude Code', type: 'lesson', youtube: null, description: 'Tell Claude Code: "Write comprehensive tests for this project using Jest. Cover the API endpoints, the database operations, and the main utility functions. Include both happy path and error cases." Claude Code will create test files, write test cases, and set up the test runner config. Run the tests and fix any failures. Testing is what makes you confident enough to deploy. It takes 10 minutes with Claude Code and saves hours of debugging later.' },
              { id: 'CH-608', title: 'Error Handling & Logging', type: 'lesson', youtube: null, description: 'Production applications need structured logging and proper error handling. Tell Claude Code: "Add Winston logging to this project. Log all API requests, errors, and important events to both console and a log file. Add global error handling middleware that catches unhandled errors and returns clean error responses." With good logging, every bug is traceable. Without it, debugging in production is guesswork. Claude Code sets this up cleanly if you ask.' },
              { id: 'CH-609', title: 'Rate Limiting & Security Basics', type: 'lesson', youtube: null, description: 'Before you deploy anything publicly, add security basics. Tell Claude Code: "Add rate limiting (100 requests per minute per IP), CORS configuration, helmet.js security headers, and input sanitization to my Express API." These four things handle the majority of common web security issues. Claude Code knows these patterns well and applies them correctly. This is non-negotiable for anything client-facing.' }
            ]
          },
          {
            name: 'Checkpoint',
            items: [
              { id: 'CH-610', title: 'Day 6 Knowledge Check', type: 'quiz', youtube: null, description: '(1) What are the three API patterns and when do you use each? (2) Why should multi-component systems be described in CLAUDE.md before building? (3) What\'s the difference between building a single app and building a system? (4) Why is testing important before deployment? (5) What security basics should every public API have? Answers in expandable sections.' },
              { id: 'CH-611', title: 'Share Your Day 6 Build', type: 'action', youtube: null, description: 'Today\'s build is the most complex yet. Post: (1) An architecture diagram or description of your system\'s components. (2) How the components communicate with each other. (3) A demo (screenshot, video, or live URL). (4) What you\'d add or change with more time. Tag #Day6. Multi-component systems are rare in portfolios and impressive to clients and employers.' }
            ]
          }

      {
        day: 7, title: 'Production-Grade Capstone', icon: '\uD83C\uDFC6', color: '#f97316',
        subtitle: 'Take your best project and make it production-ready \u2014 tests, docs, deployment, and polish',
        sections: [
          {
            name: 'Learn',
            items: [
              { id: 'CH-701', title: 'What Makes Something Production-Grade', type: 'lesson', youtube: null, description: 'Everything you\'ve built so far works. But "works on my laptop" and "runs reliably for real users" are very different things. This lesson covers the five pillars of production-ready software: (1) Reliability \u2014 error handling, retries, graceful degradation. (2) Observability \u2014 logging, monitoring, health checks. (3) Security \u2014 auth, input validation, secrets management. (4) Documentation \u2014 README, API docs, setup instructions. (5) Deployment \u2014 CI/CD, environment configuration, database migrations. You don\'t need perfection on all five for a capstone. But touching each one demonstrates professional-level skills that clients and employers look for.' },
              { id: 'CH-702', title: 'Documentation That Sells Your Work', type: 'lesson', youtube: null, description: 'A well-documented project is worth 10x an undocumented one. Why? Because it shows you think about other people, not just code. Tell Claude Code: "Write a comprehensive README for this project. Include: project description, features list, tech stack, setup instructions, environment variables needed, API documentation (if applicable), screenshots, and a section on architecture decisions." Claude Code writes excellent READMEs because it understands your entire codebase. The README becomes your portfolio piece \u2014 it\'s the first thing anyone sees on GitHub.' },
              { id: 'CH-703', title: 'CI/CD and Automated Deployment', type: 'lesson', youtube: null, description: 'Professional projects deploy automatically when you push code. Tell Claude Code: "Set up GitHub Actions for this project. On every push to main: run the test suite, check for linting errors, and if everything passes, deploy to Vercel (or Railway)." Claude Code will create the .github/workflows YAML, configure the deployment steps, and handle environment secrets. Once this is set up, you push code and it deploys automatically. It\'s the difference between "I built something" and "I shipped something."' }
            ]
          },
          {
            name: 'Build',
            items: [
              { id: 'CH-704', title: 'Capstone: Make Your Best Project Production-Ready', type: 'build', youtube: null, description: 'Pick your best project from this week \u2014 the one you\'re most proud of or most excited about. Now make it production-grade. Using Claude Code, add each layer: (1) Tell Claude: "Add comprehensive error handling and input validation to every endpoint and user-facing feature." (2) "Add structured logging with Winston. Log all API calls, errors, and key events." (3) "Write a comprehensive README with setup instructions, environment variables, API docs, and screenshots." (4) "Write tests for the core functionality using Jest." (5) "Set up GitHub Actions for CI/CD: run tests on push, deploy to Vercel on merge to main." Build each layer one at a time. Test after each addition. By the end, you\'ll have a project that looks like it was built by a professional team. Estimated time: 90\u2013120 minutes.' },
              { id: 'CH-705', title: 'Add a Feature You\'ve Been Wanting', type: 'build', youtube: null, description: 'While you\'re polishing, add that one feature you wished you had time for earlier in the week. Tell Claude Code what you want \u2014 now that you\'ve spent 6 days working with it, you know exactly how to communicate effectively. This is where the challenge comes full circle: on Day 1 you were figuring out how to describe things. Now you can describe complex features clearly and Claude Code executes them reliably. Notice how much faster you are than Day 1.' },
              { id: 'CH-706', title: 'Code Review: Ask Claude to Review Your Code', type: 'build', youtube: null, description: 'Tell Claude Code: "Review the entire codebase for this project. Look for: security vulnerabilities, performance issues, code that could be simplified, missing error handling, and any anti-patterns. List each issue with the file, line number, and a suggested fix." Claude Code will do a thorough code review and you can decide which suggestions to implement. This is a powerful way to catch issues you might have missed and learn better patterns for future builds.' }
            ]
          },
          {
            name: 'Go Deeper',
            items: [
              { id: 'CH-707d', title: 'Performance Optimization', type: 'lesson', youtube: null, description: 'Tell Claude Code: "Analyze this project for performance bottlenecks. Add caching where appropriate, optimize database queries, lazy-load frontend components, and compress API responses." Performance matters when real users hit your app. Claude Code identifies the low-hanging fruit and implements optimizations that make a noticeable difference.' },
              { id: 'CH-708', title: 'Monitoring & Health Checks', type: 'lesson', youtube: null, description: 'Tell Claude Code: "Add a /health endpoint that returns the status of the app and its dependencies (database, external APIs). Add basic uptime monitoring that pings the health endpoint every 5 minutes and sends a notification if it fails." This is how you know your deployed app is running \u2014 and how you find out immediately when it isn\'t.' },
              { id: 'CH-709', title: 'Preparing for a Portfolio', type: 'lesson', youtube: null, description: 'Your capstone project is portfolio-ready. Here\'s how to present it: (1) Push the final version to a public GitHub repo with the clean README. (2) Deploy it to a live URL. (3) Record a 60-second demo video showing the key features. (4) Write a brief "What I Built" summary that includes: the problem it solves, tech stack used, interesting challenges, and what you\'d do differently. This package \u2014 live URL + GitHub repo + demo video + writeup \u2014 is what gets freelance clients and impresses hiring managers.' }
            ]
          },
          {
            name: 'Challenge Complete',
            items: [
              { id: 'CH-710', title: 'Day 7 Knowledge Check (Final)', type: 'quiz', youtube: null, description: '(1) What are the five pillars of production-grade software? (2) Why is documentation one of the most valuable things you can add to a project? (3) What does a CI/CD pipeline do and why does it matter? (4) How do you ask Claude Code to do a code review? (5) Compare your Day 1 build to your Day 7 capstone. What changed in your approach, not just your output? Answers in expandable sections.' },
              { id: 'CH-711', title: 'Submit Your Capstone', type: 'action', youtube: null, description: 'Post your capstone in the community with: (1) A link to the GitHub repo (public). (2) A live deployed URL. (3) A screenshot or demo video. (4) A reflection: what you built, what you learned, and what you\'d do differently. Tag #Day7 and #Capstone. Nate personally reviews every capstone submission.' },
              { id: 'CH-712', title: 'Claim Your Challenge Rewards', type: 'reward', youtube: null, description: 'You finished. Seven days. Seven builds. From installing Claude Code to shipping a production-grade application. Here\'s how to claim your rewards: (1) Click the Google Form link below. (2) Submit proof of your 7 completed builds (screenshots, GitHub links, or community post links). (3) Within 48 hours, you\'ll receive: your Hall of Builders listing, partner discount codes (Airtop, Apify, Blotato, Firecrawl, Hostinger, Lindy, Twitter Scraper, Poppy AI), and an exclusive AIS+ discount code that isn\'t available anywhere else. You earned this.' },
              { id: 'CH-713', title: 'Your Path Forward', type: 'lesson', youtube: null, description: 'You\'re no longer a beginner. Here\'s where to go based on your goals: (A) Want to go deeper technically? \u2192 The Claude Code Mastery module has deep-dive references and the Skills Library has downloadable templates for common builds. (B) Want to build more? \u2192 The n8n Template Library has 70+ automation templates if you want to explore workflow automation next. (C) Want to make money with these skills? \u2192 AIS+ is where members learn to find clients, price projects, and deliver AI automation as a service. Members like Aidan ($14K contract), Mike ($6K first client), and Jose ($500 first audit) started exactly where you are now. The skills you built this week are commercially valuable. The question is whether you want to sell them.' }

// =====================================================
// RENDER ENGINE
// =====================================================

const SECTION_LABELS = {
  'getting-started': 'Getting Started',
  'core-curriculum': 'Core Curriculum',
  'library-resources': 'Library & Resources',
  'ais-plus': 'AIS+ Membership'
};

let currentModule = null;
let currentLesson = null;

function extractVideoId(url) {
  if (!url) return null;
  const match = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return match ? match[1] : url.length === 11 ? url : null;
}

function getLevelPipClass(level) {
  if (!level) return '';
  const l = level.toLowerCase();
  if (l === 'advanced') return 'advanced';
  if (l.includes('intermediate+') || l === 'intermediate+') return 'intermediate-plus';
  if (l.includes('intermediate')) return 'intermediate';
  if (l.includes('beginner+') || l === 'beginner+') return 'beginner-plus';
  if (l.includes('beginner')) return 'beginner';
  return '';
}

function getLevelPipLabel(level) {
  if (!level) return '';
  const l = level.toLowerCase();
  if (l === 'advanced') return 'ADV';
  if (l === 'intermediate+' || l.includes('intermediate+')) return 'INT+';
  if (l.includes('intermediate')) return 'INT';
  if (l === 'beginner+' || l.includes('beginner+')) return 'BEG+';
  if (l.includes('beginner')) return 'BEG';
  return '';
}

function renderSidebar() {
  var nav = document.getElementById('sidebar-nav');
  var html = '';
  var lastSection = '';

  MODULES.forEach(function(mod, mi) {
    if (mod.section !== lastSection) {
      html += '<div class="phase-divider">' + SECTION_LABELS[mod.section] + '</div>';
      lastSection = mod.section;
    }

    var lessonCount = mod.lessons ? mod.lessons.length :
                      mod.isChallenge ? mod.days.reduce(function(s,d) { return s + d.sections.reduce(function(ss,sec) { return ss + sec.items.length; }, 0); }, 0) :
                      mod.isLibrary ? mod.categories.reduce(function(s,c) { return s + c.templates.length; }, 0) :
                      mod.isSpecial === 'discussions' ? mod.discussions.length :
                      mod.isSpecial === 'podcast' ? mod.episodes.length :
                      mod.isSpecial === 'discounts' ? mod.discounts.length :
                      mod.isSpecial === 'success-stories' ? mod.stories.length :
                      1;

    html += '<div class="module-group" data-module="' + mi + '">';
    html += '<div class="module-header" onclick="toggleModule(' + mi + ')">';
    html += '<div class="module-icon" style="background:' + mod.iconBg + '">' + mod.icon + '</div>';
    html += '<div class="module-name">' + mod.name + '</div>';

    if (mod.hasReward) {
      html += '<span class="module-badge reward">\uD83C\uDFC6 Rewards</span>';
    }
    if (mod.isPaid) {
      html += '<span class="module-badge paid">PAID</span>';
    }

    html += '<div class="module-count">' + lessonCount + '</div>';
    html += '<div class="chevron">\u25B6</div>';
    html += '</div>';
    html += '<div class="module-lessons">';

    if (mod.lessons) {
      mod.lessons.forEach(function(lesson, li) {
        var levelCls = lesson.levelKey ? lesson.levelKey : getLevelPipClass(lesson.level);
        var levelLabel = lesson.levelKey ? getLevelPipLabel(lesson.level) : '';

        html += '<div class="lesson-item" data-module="' + mi + '" data-lesson="' + li + '" onclick="selectLesson(' + mi + ',' + li + ')">';
        html += '<span class="lesson-num">' + (lesson.isOverview ? '0' : li) + '</span>';
        html += '<span class="lesson-label">' + lesson.title + '</span>';

        if (lesson.comingSoon) {
          html += '<span class="level-pip coming-soon">SOON</span>';
        } else if (lesson.levelKey && levelLabel) {
          html += '<span class="level-pip ' + levelCls + '">' + levelLabel + '</span>';
        }

        html += '</div>';
      });
    } else if (mod.isChallenge) {
      mod.days.forEach(function(day, di) {
        var itemCount = day.sections.reduce(function(s,sec) { return s + sec.items.length; }, 0);
        html += '<div class="lesson-item" data-module="' + mi + '" data-day="' + di + '" onclick="selectDay(' + mi + ',' + di + ')" style="font-weight:600;color:var(--text)">';
        html += '<span class="lesson-num" style="background:' + day.color + ';color:#fff;min-width:22px;text-align:center;border-radius:4px;padding:1px 4px;font-size:10px">' + (day.day === 0 ? 'HQ' : day.day) + '</span>';
        html += '<span style="flex:1">' + day.icon + ' ' + day.title + '</span>';
        html += '<span style="font-size:11px;color:var(--text-muted)">' + itemCount + '</span>';
        html += '</div>';
      });
    } else if (mod.isLibrary) {
      mod.categories.forEach(function(cat, ci) {
        html += '<div class="lesson-item" data-module="' + mi + '" data-cat="' + ci + '" onclick="selectCategory(' + mi + ',' + ci + ')" style="font-weight:600;color:var(--text)">';
        html += '<span class="lesson-num">' + cat.templates.length + '</span> ' + cat.name;
        html += '</div>';
      });
    } else if (mod.isSpecial === 'podcast') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'podcast\')"><span class="lesson-num">' + mod.episodes.length + '</span> Episodes</div>';
    } else if (mod.isSpecial === 'discounts') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'discounts\')"><span class="lesson-num">' + mod.discounts.length + '</span> Partner Codes</div>';
    } else if (mod.isSpecial === 'discussions') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'discussions\')"><span class="lesson-num">' + mod.discussions.length + '</span> Discussions</div>';
    } else if (mod.isSpecial === 'success-stories') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'stories\')"><span class="lesson-num">' + mod.stories.length + '</span> Member Stories</div>';
    } else if (mod.isSpecial === 'upsell') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'upsell\')"><span class="lesson-num">\u2192</span> What\'s Inside AIS+</div>';
    }

    html += '</div></div>';
  });

  nav.innerHTML = html;
}

function toggleModule(mi) {
  var group = document.querySelector('.module-group[data-module="' + mi + '"]');
  group.classList.toggle('open');
}

function selectLesson(mi, li) {
  currentModule = mi;
  currentLesson = li;

  document.querySelectorAll('.lesson-item').forEach(function(el) { el.classList.remove('active'); });
  var item = document.querySelector('.lesson-item[data-module="' + mi + '"][data-lesson="' + li + '"]');
  if (item) item.classList.add('active');

  var mod = MODULES[mi];
  var lesson = mod.lessons[li];
  renderLesson(mod, lesson, li);
}

function renderLesson(mod, lesson, li) {
  var main = document.getElementById('main-content');
  var videoId = extractVideoId(lesson.youtube);

  var html = '<div class="lesson-view">';
  html += '<div class="lesson-breadcrumb">' + mod.name + ' <span>\u2192 ' + (lesson.isOverview ? 'Overview' : 'Lesson ' + li) + '</span></div>';
  html += '<h1 class="lesson-title">' + lesson.title + '</h1>';

  // Meta tags
  html += '<div class="lesson-meta">';
  html += '<span class="meta-tag id">' + lesson.id + '</span>';
  if (lesson.level) html += '<span class="meta-tag level">' + lesson.level + '</span>';
  if (lesson.comingSoon) html += '<span class="meta-tag coming-soon">COMING SOON</span>';
  if (lesson.youtube || lesson.videoType === 'loom') html += '<span class="meta-tag video">\u25B6 Video</span>';
  if (lesson.hasTemplate) html += '<span class="meta-tag template">\u2B07 Template</span>';
  if (lesson.hasGuide) html += '<span class="meta-tag guide">\uD83D\uDCC4 Guide</span>';
  html += '</div>';

  // Reward banner for challenge lessons
  if (mod.hasReward && lesson.isOverview) {
    html += '<div class="reward-banner">';

  if (lesson.takeaways && lesson.takeaways.length) {
    html += '<div class="content-section takeaways"><h2><span class="section-icon">\u2726</span> Key Takeaways</h2><ul>';

    html += '<div class="content-section"><h2><span class="section-icon">\uD83D\uDCE6</span> Resources</h2>';

    html += '<div class="content-section"><h2><span class="section-icon">\uD83D\uDCE6</span> Resources</h2>';

  html += '</div>';

function goNext(mi, li) {
  var mod = MODULES[mi];
  if (mod.lessons && li + 1 < mod.lessons.length) {
    selectLesson(mi, li + 1);
  } else if (mi + 1 < MODULES.length && MODULES[mi+1].lessons) {

function navigateToModule(mi) {
  var group = document.querySelector('.module-group[data-module="' + mi + '"]');
  if (group && !group.classList.contains('open')) group.classList.add('open');
  var mod = MODULES[mi];
  if (mod.isChallenge) {
    selectDay(mi, 0);
  } else if (mod.isSpecial === 'success-stories') {
    selectSpecial(mi, 'stories');
  } else if (mod.isSpecial) {
    selectSpecial(mi, mod.isSpecial);
  } else if (mod.lessons) {
    selectLesson(mi, 0);
  }
}

    return;
  }

  if (mod.isSpecial === 'success-stories') {
    var html = '<div class="lesson-view">';
    html += '<div class="lesson-breadcrumb">' + mod.name + '</div>';
    html += '<h1 class="lesson-title">AIS+ Success Stories</h1>';
    html += '<p style="color:var(--text-muted);margin-bottom:32px;font-size:15px">Real members. Real results. These builders were exactly where you are now.</p>';
    html += '<div class="template-grid">';
    mod.stories.forEach(function(s) {
      html += '<div class="template-card" onclick="window.open(\'' + s.skoolUrl + '\', \'_blank\')">';
      html += '<div style="font-size:28px;font-weight:800;color:var(--green);margin-bottom:8px">' + s.amount + '</div>';
      html += '<div class="tc-name">' + s.title + '</div>';
      html += '<div style="font-size:12px;color:var(--text-muted);margin:6px 0 10px;line-height:1.5">' + s.desc + '</div>';
      html += '<div style="font-size:12px;font-weight:600;color:var(--accent)">Watch Story \u2192</div>';
      html += '</div>';
    });
    html += '</div></div>';
    main.innerHTML = html;
    main.scrollTop = 0;
    return;
  }

  // Discussions (refactored community)
  var html = '<div class="lesson-view">';
  html += '<div class="lesson-breadcrumb">' + mod.name + '</div>';

  if (section === 'discussions') {
    html += '<h1 class="lesson-title">Community Discussions</h1>';
    html += '<p style="color:var(--text-muted);margin-bottom:24px">Engage with the community. Share your thoughts, learn from others.</p>';
    mod.discussions.forEach(function(d) {
      html += '<div class="template-card" style="margin-bottom:8px"><div class="tc-id">' + d.id + '</div><div class="tc-name">' + d.title + '</div></div>';
    });
  }

  html += '</div>';
  main.innerHTML = html;
  main.scrollTop = 0;
}

function renderWelcome() {
  var main = document.getElementById('main-content');
  var totalTemplates = 0;
  MODULES.forEach(function(m) { if (m.isLibrary && !m.libraryType) m.categories.forEach(function(c) { totalTemplates += c.templates.length; }); });

  var totalLessons = 0;
  MODULES.forEach(function(m) { if (m.lessons) totalLessons += m.lessons.length; });

  var html = '<div class="welcome-view">';
  html += '<h1>AI Automation Society</h1>';
  html += '<div class="welcome-sub">Your structured path from zero to building and selling AI automations with Claude Code. Start with the fundamentals, build real projects in the 7-Day Challenge, then go deeper with mastery modules and templates.</div>';

  html += '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-num">10</div><div class="stat-label">Modules</div></div>';
  html += '<div class="stat-card"><div class="stat-num">' + totalLessons + '</div><div class="stat-label">Lessons</div></div>';
  html += '<div class="stat-card"><div class="stat-num">' + totalTemplates + '</div><div class="stat-label">Templates</div></div>';
  html += '<div class="stat-card"><div class="stat-num">7</div><div class="stat-label">Day Challenge</div></div>';
  html += '</div>';

  html += '<div class="reward-banner" style="max-width:500px;margin:0 auto 40px">';
  html += '<div class="reward-icon">\uD83C\uDFC6</div>';
  html += '<div class="reward-text">';
  html += '<div class="reward-title">7-Day Claude Code Builder Challenge</div>';
  html += '<div class="reward-desc">Complete all 7 days to unlock exclusive rewards. Build real projects with Claude Code + n8n.</div>';
  html += '</div>';
  html += '</div>';

  html += '<div class="roadmap"><h2>Your Learning Path</h2>';

  // Getting Started
  var gettingStarted = MODULES.filter(function(m) { return m.section === 'getting-started'; });
  html += '<div class="roadmap-phase"><h3>Getting Started</h3>';
  var globalNum = 1;
  gettingStarted.forEach(function(m) {
    var count = m.lessons ? m.lessons.length : 0;
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    if (m.hasReward) html += '<span class="ri-badge" style="background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)">\uD83C\uDFC6 Rewards</span>';
    html += '<div class="ri-count">' + count + ' lessons</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div>';

  // Core Curriculum
  var coreCurriculum = MODULES.filter(function(m) { return m.section === 'core-curriculum'; });
  html += '<div class="roadmap-phase"><h3>Core Curriculum</h3>';
  coreCurriculum.forEach(function(m) {
    var count = m.lessons ? m.lessons.length : m.isChallenge ? m.days.length + ' days, ' + m.days.reduce(function(s,d) { return s + d.sections.reduce(function(ss,sec) { return ss + sec.items.length; }, 0); }, 0) : m.isLibrary ? m.categories.reduce(function(s,c) { return s + c.templates.length; }, 0) : 0;
    var label = m.lessons ? 'lessons' : m.isChallenge ? 'items' : m.isLibrary ? 'items' : 'items';
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    if (m.hasReward) html += '<span class="ri-badge" style="background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)">\uD83C\uDFC6 Rewards</span>';
    html += '<div class="ri-count">' + count + ' ' + label + '</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div>';

  // Library & Resources
  var libraryResources = MODULES.filter(function(m) { return m.section === 'library-resources'; });
  html += '<div class="roadmap-phase"><h3>Library & Resources</h3>';
  libraryResources.forEach(function(m) {
    var count = m.isLibrary ? totalTemplates : m.isSpecial === 'podcast' ? m.episodes.length : m.isSpecial === 'discounts' ? m.discounts.length : m.isSpecial === 'discussions' ? m.discussions.length : 0;
    var label = m.isLibrary ? 'templates' : m.isSpecial === 'podcast' ? 'episodes' : m.isSpecial === 'discounts' ? 'codes' : m.isSpecial === 'discussions' ? 'discussions' : 'items';
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    html += '<div class="ri-count">' + count + ' ' + label + '</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div>';

  // AIS+ Membership
  var aisPlus = MODULES.filter(function(m) { return m.section === 'ais-plus'; });
  html += '<div class="roadmap-phase"><h3>AIS+ Membership</h3>';
  aisPlus.forEach(function(m) {
    var count = m.isSpecial === 'success-stories' ? m.stories.length : 1;
    var label = m.isSpecial === 'success-stories' ? 'stories' : 'items';
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    if (m.isPaid) html += '<span class="ri-badge" style="background:rgba(167,139,250,0.15);color:var(--purple);border:1px solid rgba(167,139,250,0.3)">PAID</span>';
    html += '<div class="ri-count">' + count + ' ' + label + '</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div></div>';

  html += '</div>';
  main.innerHTML = html;
}

// =====================================================
// INIT
// =====================================================

renderSidebar();
renderWelcome();
</script>

</body>
</html>
