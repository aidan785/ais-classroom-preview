<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS Free Classroom — Prototype v2</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --border: #333;
    --text: #e8e8e8;
    --text-muted: #999;
    --text-dim: #666;
    --accent: #4f8fff;
    --accent-hover: #6ba1ff;
    --green: #34d399;
    --orange: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --gold: #fbbf24;
    --sidebar-w: 320px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .sidebar-header .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .sidebar-header .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 8px;
  }

  .sidebar-actions {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tracker-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 8px 12px;
    background: linear-gradient(135deg, #1a2d1a 0%, #1a2744 100%);
    border: 1px solid rgba(79, 143, 255, 0.25);
    border-radius: 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .tracker-btn:hover {
    border-color: var(--accent);
    background: linear-gradient(135deg, #1a2d1a 0%, #1a3055 100%);
  }

  .tracker-btn .tracker-icon { font-size: 14px; }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .sidebar-nav::-webkit-scrollbar { width: 6px; }
  .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .module-group { margin-bottom: 4px; }

  .module-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }

  .module-header:hover { background: var(--surface2); }

  .module-header .module-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .module-header .module-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .module-header .module-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .module-badge.reward {
    background: rgba(251, 191, 36, 0.15);
    color: var(--gold);
    border: 1px solid rgba(251, 191, 36, 0.3);
  }

  .module-badge.paid {
    background: rgba(167, 139, 250, 0.15);
    color: var(--purple);
    border: 1px solid rgba(167, 139, 250, 0.3);
  }

  .module-header .module-count {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface3);
    padding: 1px 7px;
    border-radius: 8px;
  }

  .module-header .chevron {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .module-group.open .chevron { transform: rotate(90deg); }

  .module-lessons {
    display: none;
    padding: 0 0 4px 0;
  }

  .module-group.open .module-lessons { display: block; }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px 7px 54px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .lesson-item:hover { background: var(--surface2); color: var(--text); }
  .lesson-item.active { background: var(--surface3); color: var(--accent); }

  .lesson-item .lesson-num {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 18px;
    flex-shrink: 0;
  }

  .lesson-item .lesson-label {
    flex: 1;
  }

  .lesson-item .level-pip {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .level-pip.beginner { background: rgba(52, 211, 153, 0.15); color: var(--green); }
  .level-pip.beginner-plus { background: rgba(52, 211, 153, 0.15); color: #5ee6b5; }
  .level-pip.intermediate { background: rgba(79, 143, 255, 0.15); color: var(--accent); }
  .level-pip.intermediate-plus { background: rgba(167, 139, 250, 0.15); color: var(--purple); }
  .level-pip.advanced { background: rgba(239, 68, 68, 0.15); color: var(--red); }
  .level-pip.coming-soon { background: rgba(102, 102, 102, 0.2); color: var(--text-dim); }

  .phase-divider {
    padding: 16px 16px 6px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }

  /* ── Main Content ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .main::-webkit-scrollbar { width: 8px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .lesson-view {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 48px 80px;
  }

  .lesson-breadcrumb {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .lesson-breadcrumb span { color: var(--text-muted); }

  .lesson-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
    line-height: 1.25;
  }

  .lesson-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .meta-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 500;
  }

  .meta-tag.id { background: var(--surface3); color: var(--text-muted); }
  .meta-tag.level { background: #1a2744; color: var(--accent); }
  .meta-tag.video { background: #1f2d1a; color: var(--green); }
  .meta-tag.template { background: #2d2a1a; color: var(--orange); }
  .meta-tag.guide { background: #2a1a2d; color: var(--purple); }
  .meta-tag.coming-soon { background: #2e2e2e; color: var(--text-dim); border: 1px dashed var(--text-dim); }
  .meta-tag.reward { background: rgba(251, 191, 36, 0.1); color: var(--gold); }

  .video-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 32px;
    border: 1px solid var(--border);
  }

  .video-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 0;
  }

  .video-thumb {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    text-decoration: none;
  }

  .video-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.2s, filter 0.2s;
  }

  .video-thumb:hover img {
    transform: scale(1.03);
    filter: brightness(0.7);
  }

  .video-thumb .play-btn {
    position: absolute;
    width: 72px; height: 50px;
    background: rgba(255,0,0,0.85);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .video-thumb:hover .play-btn {
    background: rgba(255,0,0,1);
    transform: scale(1.08);
  }

  .play-btn::after {
    content: '';
    display: block;
    width: 0; height: 0;
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent #fff;
    margin-left: 3px;
  }

  .video-placeholder {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    color: var(--text-dim);
  }

  .video-placeholder .play-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .video-placeholder span { font-size: 14px; }

  .content-section {
    margin-bottom: 32px;
  }

  .content-section h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .content-section h2 .section-icon {
    font-size: 16px;
  }

  .content-section p {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .content-section ul {
    list-style: none;
    padding: 0;
  }

  .content-section ul li {
    position: relative;
    padding: 8px 0 8px 24px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-muted);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .content-section ul li:last-child { border-bottom: none; }

  .content-section ul li::before {
    content: '\2192';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 600;
  }

  .content-section.takeaways ul li::before { content: '\2726'; color: var(--green); }
  .content-section.actions ul li::before { content: '\2610'; color: var(--orange); }

  .callout {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 16px 20px;
    margin: 20px 0;
  }

  .callout.proof {
    border-left-color: var(--green);
  }

  .callout.reward {
    border-left-color: var(--gold);
    background: rgba(251, 191, 36, 0.05);
  }

  .callout p {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-muted);
    margin: 0;
  }

  .callout strong { color: var(--text); }

  .next-step-card {
    background: linear-gradient(135deg, #1a2744 0%, #1a1a2e 100%);
    border: 1px solid rgba(79, 143, 255, 0.2);
    border-radius: 12px;
    padding: 24px;
    margin-top: 32px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .next-step-card:hover { border-color: var(--accent); }

  .next-step-card .next-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .next-step-card .next-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  .resource-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .resource-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .resource-card:hover { border-color: var(--accent); }

  .resource-card .rc-icon { font-size: 24px; margin-bottom: 8px; }
  .resource-card .rc-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .resource-card .rc-name { font-size: 14px; font-weight: 600; color: var(--text); }

  /* ── Welcome/Landing View ── */
  .welcome-view {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 48px;
    text-align: center;
  }

  .welcome-view h1 {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff 0%, #999 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome-view .welcome-sub {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 560px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 16px;
  }

  .stat-card .stat-num {
    font-size: 32px;
    font-weight: 800;
    color: var(--accent);
  }

  .stat-card .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .roadmap {
    text-align: left;
    margin-top: 48px;
  }

  .roadmap h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
    text-align: center;
  }

  .roadmap-phase {
    margin-bottom: 32px;
  }

  .roadmap-phase h3 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .roadmap-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .roadmap-item:hover { border-color: var(--accent); background: var(--surface2); }

  .roadmap-item .ri-num {
    width: 32px; height: 32px;
    background: var(--surface3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .roadmap-item .ri-name { font-size: 15px; font-weight: 600; flex: 1; }
  .roadmap-item .ri-count { font-size: 12px; color: var(--text-dim); }
  .roadmap-item .ri-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Category headers in template library ── */
  .category-header {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin: 32px 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .category-header:first-child { margin-top: 0; }

  .template-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .template-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .template-card:hover { border-color: var(--accent); }

  .template-card .tc-id { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .template-card .tc-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .template-card .tc-level { font-size: 12px; color: var(--accent); }

  /* ── Reward banner ── */
  .reward-banner {
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.08) 0%, rgba(251, 191, 36, 0.02) 100%);
    border: 1px solid rgba(251, 191, 36, 0.25);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .reward-banner .reward-icon { font-size: 24px; }
  .reward-banner .reward-text { flex: 1; }
  .reward-banner .reward-title { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 2px; }
  .reward-banner .reward-desc { font-size: 12px; color: var(--text-muted); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .sidebar { width: 260px; min-width: 260px; }
    .lesson-view { padding: 24px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>AI Automation Society</h1>
    <div class="subtitle">Free Classroom</div>
    <span class="badge">PROTOTYPE v2</span>
  </div>
  <div class="sidebar-actions">
    <button class="tracker-btn" onclick="alert('Download the Progress Tracker spreadsheet to track your 7-Day Challenge completion!')">
      <span class="tracker-icon">&#128202;</span> Download Progress Tracker
    </button>
  </div>
  <div class="sidebar-nav" id="sidebar-nav"></div>
</div>

<div class="main" id="main-content"></div>

<script>
// =====================================================
// DATA - All modules with new structure
// =====================================================

const MODULES = [
  {
    id: 'start-here',
    name: 'Start Here',
    icon: '\uD83D\uDCCD',
    iconBg: '#2d1a1a',
    section: 'getting-started',
    lessons: [
      {
        id: 'SH-001', title: 'Community Rules & Guidelines', level: 'Start', videoType: 'loom',
        hasTemplate: false, hasGuide: false,
        summary: '<p>Welcome to the AI Automation Society. This is the most important lesson in the entire community because it sets the foundation for how we operate. Watch the Loom walkthrough to understand our community standards, how we treat each other, and what\'s expected of you as a member.</p><p>This isn\'t a passive content library \u2014 it\'s an active community of builders. The rules exist to keep things productive, respectful, and focused so everyone can learn faster and build real things.</p>',

      {

        summary: '<p>Every builder gets stuck. The difference between people who stay stuck and people who break through is knowing how to ask the right question. This lesson shows you exactly how to request help inside the community so you get fast, useful answers.</p><p>A good help request includes what you\'re building, what you\'ve tried, where you\'re stuck, and a screenshot or error message. The more specific your question, the faster someone can help you.</p>',

        nextStep: 'Move to Lesson 3: Introduce Yourself'
      },
      {
        id: 'SH-003', title: 'Introduce Yourself', level: 'Start', videoType: 'loom',
        hasTemplate: false, hasGuide: false,
        summary: '<p>Before you start building, take 60 seconds to introduce yourself. Tell us who you are, what brought you here, and what you want to build or achieve with AI automation.</p><p>The members who introduce themselves and engage early are consistently the ones who get the most value out of this community.</p>',

        nextStep: 'Move to Lesson 4: AI Isn\'t Hard. It\'s Misunderstood.'
      },
      {
        id: 'BN-009', title: 'AI Isn\'t Hard. It\'s Misunderstood.', level: 'Beginner \u2192 Intermediate',
        youtube: 'ip8FEYOQob0', hasTemplate: false, hasGuide: true,
        summary: '<p>Most people overcomplicate AI. They chase every new tool, try to build overly complex systems, and burn out before making a dollar. This lesson reframes how you should think about AI automation \u2014 with an emphasis on leverage, simplicity, and process-first thinking.</p><p>The core idea: understand the business problem before you touch any tool. AI automation isn\'t about building the flashiest agent \u2014 it\'s about finding a process that wastes time or money, and eliminating that waste with a simple, reliable workflow.</p>',

        nextStep: 'Move to Lesson 5: How I\'d Learn n8n in 2026'
      },
      {

              { id: 'FT-073', title: 'AI Email Agent \u2014 Full Walkthrough', type: 'video', youtube: 'YFrej2oSldo', description: 'Nate builds a complete AI email agent from scratch in this walkthrough. The system connects to Gmail, reads incoming emails, uses AI to classify them into categories (client inquiry, newsletter, internal, spam, urgent), drafts appropriate responses for each category, and queues them for your review before sending. Watch how Nate structures the prompts for classification \u2014 the way you define categories determines how well the agent performs. This is the core build for Day 2.' },

            items: [
              { id: 'CC-003', title: 'Master 95% of Claude Code', type: 'video', youtube: 'BVNhg1pCbeg', description: 'This is the most important reference video in the entire challenge. Nate covers every Claude Code feature you\'ll actually use: slash commands, context management, how to give Claude access to files and projects, how to chain multiple requests into complex builds, the CLAUDE.md project file that gives Claude persistent memory, and the specific prompt structures that produce the best output. You will come back to this video repeatedly. Watch it once now for the overview, then bookmark it \u2014 you\'ll reference specific sections on Days 4\u20137.' },
              { id: 'CH-301', title: 'The WAT Framework: Workflow \u2192 Agent \u2192 Tool', type: 'lesson', youtube: null, description: 'Before you build anything, you need to decide WHAT to build. That\'s where WAT comes in. Workflow: a fixed sequence of steps (trigger \u2192 process \u2192 output). Use this when the logic is predictable. Agent: an AI that decides its own steps based on the input. Use this when you need flexibility. Tool: a reusable capability that agents or workflows can call. Use this for shared functions like "send email" or "query database." Every build in this challenge falls into one of these three patterns, or a combination. When you\'re stuck on how to structure something, ask: "Is this a Workflow, an Agent, or a Tool?" The answer tells you exactly how to architect it.' },
              { id: 'CH-302', title: 'Prompt Engineering for Claude Code', type: 'lesson', youtube: null, description: 'Claude Code responds differently depending on how you talk to it. Here are the three core patterns that work: (1) Direct Generation: "Build an n8n workflow that does X, Y, Z." Best for simple, well-defined builds. (2) Iterative Building: "Start with a webhook trigger. Now add a GPT node. Now add error handling." Best for complex builds where you want control over each step. (3) Template-Based: "Here\'s my existing workflow JSON. Modify it to also do X." Best for extending existing work. The key insight: start with the simplest pattern that could work. You can always switch to iterative building if the direct approach produces something wrong. Trying to specify everything upfront is a common mistake \u2014 Claude Code actually performs better with shorter, clearer instructions.' },
              { id: 'CH-303', title: 'MCP Servers, Skills Files & Project Memory', type: 'lesson', youtube: null, description: 'Three features that take your Claude Code usage from good to great: (1) MCP Servers extend Claude\'s abilities. The n8n MCP server lets Claude interact with your n8n instance. But there are MCP servers for databases, APIs, file systems, and more. Each one gives Claude new superpowers. (2) Skills files (.claude/skills/) are reusable prompt templates. Instead of explaining the same thing every time, you write it once as a skill file and Claude loads it automatically. We\'ll build skills on Days 4\u20137. (3) CLAUDE.md is your project memory file. Put project context, coding standards, and architecture notes here \u2014 Claude reads it at the start of every session. This means Claude "remembers" your project between conversations.' }

              { id: 'FT-003', title: 'Reference: The 17 Core n8n Nodes', type: 'template', youtube: 'D9MIGseFB3g', description: 'These 17 nodes handle 90% of everything you\'ll ever build in n8n: Webhook, HTTP Request, Set, IF, Switch, Code, Merge, Split In Batches, Wait, Gmail, Slack, Google Sheets, Postgres, AI Agent, AI Chain, Text Classifier, and Manual Trigger. This video walks through each one with real examples. Understanding these nodes is like learning vocabulary \u2014 the more nodes you know, the better you can describe what you want to Claude Code. When you say "split the data into batches and process each one," Claude knows exactly which node to use because you\'re speaking its language.' }

              { id: 'FT-039', title: '25 n8n Power User Hacks', type: 'template', youtube: 'zMy5yoA-ub8', description: '25 tips and tricks that make your n8n builds faster and more reliable. Highlights: how to use expressions to dynamically set values, the "Sticky Note" trick for documenting workflows, how to use sub-workflows to keep things modular, the environment variable pattern for managing API keys, and the execution data trick for debugging. These aren\'t theoretical \u2014 they\'re the actual shortcuts that experienced n8n builders use daily. Pick 5 that seem useful and start using them in your builds.' },
              { id: 'FT-025', title: 'Webhook Security', type: 'template', youtube: '3FfCRbq3XMs', description: 'If any of your workflows use webhooks (and most will), you need to secure them. An open webhook is an open door \u2014 anyone who finds the URL can trigger your workflow with whatever data they want. This template covers: authentication headers, IP allowlisting, payload validation, rate limiting, and HMAC signature verification. This is especially important for any workflow you deploy for a client or expose to the internet. Learn it now, apply it to everything you build going forward.' }

              { id: 'FT-059', title: 'Personal Assistant Architecture v2', type: 'template', youtube: 'omw1MEvMCo0', description: 'A redesigned personal assistant that uses a different architecture: instead of one big workflow, it uses a hub-and-spoke model where a central orchestrator workflow delegates to specialized sub-workflows. Compare this to FT-049 to understand when monolithic vs. modular architecture is the right choice. Spoiler: modular almost always wins for anything beyond simple demos.' },
              { id: 'FT-060', title: 'Personal Assistant 2.0 \u2014 Advanced Features', type: 'template', youtube: '9G-5SiShBKM', description: 'The evolved version with memory, learning, and proactive suggestions. This assistant doesn\'t just respond to commands \u2014 it notices patterns (you always check analytics on Monday morning) and proactively surfaces relevant info. Includes Google Calendar integration, Notion database reading, and a learning loop that gets better over time. This is the kind of build that makes clients say "how much would it cost to build this for my team?"' }

      {
        day: 5, title: 'RAG & Knowledge Systems', icon: '\uD83D\uDCDA', color: '#06b6d4',
        subtitle: 'Build AI agents that answer questions from your own documents \u2014 the highest-value skill in AI automation',
        sections: [
          {
            name: 'Learn',
            items: [
              { id: 'CH-501', title: 'What is RAG and Why Every Business Needs It', type: 'lesson', youtube: null, description: 'RAG stands for Retrieval-Augmented Generation. In plain English: instead of the AI making things up from its training data, it first searches YOUR documents for relevant information, then generates a response based on what it found. This is behind every "chat with your docs" tool, every custom knowledge base, every internal Q&A bot. Why it matters commercially: every business has documents (SOPs, policies, product specs, training materials) that employees spend hours searching through. A RAG agent that answers questions from those documents saves real time and money. AIS+ members consistently report RAG builds as their highest-paying projects ($3K\u2013$15K per build).' },
              { id: 'FT-011', title: 'RAG Pipelines: Architecture Deep Dive', type: 'video', youtube: '5uw1wE6niGc', description: 'Nate breaks down the full RAG pipeline architecture: (1) Ingestion \u2014 loading documents into the system (PDFs, web pages, databases). (2) Chunking \u2014 splitting documents into digestible pieces so the AI can find specific information. (3) Embedding \u2014 converting text chunks into mathematical vectors that represent meaning. (4) Storage \u2014 saving those vectors in a vector database (Pinecone, Supabase, Qdrant). (5) Retrieval \u2014 when a user asks a question, finding the most relevant chunks. (6) Generation \u2014 feeding the retrieved chunks to an LLM to generate an answer. Understanding this pipeline is essential. Watch this before you build.' },
              { id: 'CH-502', title: 'Vector Databases: Pinecone vs Supabase vs Others', type: 'lesson', youtube: null, description: 'Vector databases store your document embeddings and handle similarity search. Here\'s when to use what: Pinecone \u2014 managed, easy to set up, free tier for small projects, best for getting started quickly. Supabase \u2014 open source, runs on Postgres with pgvector, good if you want your data on your own infrastructure. Qdrant \u2014 high performance, good for large datasets. Chroma \u2014 lightweight, great for local development and testing. For this challenge, we use Pinecone (easiest setup) and Supabase (most control). Pick one for your main build \u2014 you can always switch later.' }
            ]
          },
          {
            name: 'Build',
            items: [
              { id: 'FT-024', title: 'Project: Build Your First RAG Agent', type: 'template', youtube: 'cCD303XsUjI', description: 'Your main build today: a RAG agent that ingests documents and answers questions about them. Using Claude Code + n8n, you\'ll build: (1) A document ingestion pipeline that accepts PDFs or text files. (2) A chunking and embedding workflow that processes documents into vectors. (3) A vector storage connection (Pinecone or Supabase). (4) A query pipeline where users ask questions and get AI-generated answers backed by your documents. Start with a small set of documents (3\u20135 pages). Test with questions you know the answer to so you can verify accuracy. Estimated time: 60\u201375 minutes.' },
              { id: 'FT-014', title: 'Pinecone Assistant Build', type: 'template', youtube: 'QojPKL96Dx4', description: 'An alternative RAG build focused specifically on Pinecone. This template creates a fully managed assistant: you upload documents to Pinecone, and the system handles chunking, embedding, and retrieval automatically. Less customization than building each step yourself, but dramatically faster to deploy. Good for situations where you need a working RAG system in under 30 minutes \u2014 like a client demo or proof of concept.' },
              { id: 'FT-054', title: 'Alternate Build: Custom RAG AI Agent', type: 'template', youtube: 'iT9xpiUwVbI', description: 'This version builds the RAG system with more manual control over each step. Instead of using Pinecone\'s managed pipeline, you configure the chunking strategy, choose the embedding model, and write custom retrieval logic. The result is more work upfront but a system you can tune precisely. Build this if you finished the main project early and want to understand what\'s happening under the hood of the managed version.' }
            ]
          },
          {
            name: 'Go Deeper',
            items: [
              { id: 'FT-029', title: 'RAG Reranking: Better Answers, Same Data', type: 'template', youtube: 'xWhX61651H8', description: 'Basic RAG retrieves the top N most similar chunks. Reranking adds a second pass: after retrieval, a reranking model re-scores the chunks based on how well they actually answer the question (not just how similar they are to it). This consistently improves answer quality by 15\u201330% with minimal added complexity. If your RAG agent is returning "close but not quite right" answers, reranking is usually the fix.' },
              { id: 'FT-055', title: 'Dynamic Brain: Self-Updating Knowledge', type: 'template', youtube: 'gwCQF--cARA', description: 'Most RAG systems are static \u2014 you load documents once and the knowledge is frozen. Dynamic Brain is a pattern where the system automatically detects new or changed documents, re-processes them, and updates the vector store. This means your RAG agent always has the latest information. Critical for use cases like company wikis, product documentation, or any knowledge base that changes regularly.' },
              { id: 'FT-026', title: 'Long-Term Memory with ZEP', type: 'template', youtube: 'kNsX2qu8jHY', description: 'ZEP adds conversation memory to your AI agents. Instead of each conversation starting from scratch, ZEP stores past interactions and makes them searchable. Your agent can reference what a user asked last week, remember their preferences, and maintain context across sessions. This is the difference between a chatbot that feels disposable and one that feels like it actually knows you.' },
              { id: 'FT-064', title: 'Voice RAG Agent', type: 'template', youtube: 'pJYm7MOyMH0', description: 'Combine everything from today with a voice interface. Ask questions about your documents by speaking, and hear the answers read back. Uses ElevenLabs for speech synthesis and Whisper for speech recognition. The end result is like having a voice assistant that actually knows your specific documents. Impressive for demos, genuinely useful for hands-free information retrieval.' }
            ]
          },
          {
            name: 'Checkpoint',
            items: [
              { id: 'CH-503', title: 'Day 5 Knowledge Check', type: 'quiz', youtube: null, description: '(1) What are the 6 stages of a RAG pipeline? (2) Why does chunking strategy matter and what happens if chunks are too large or too small? (3) What\'s the difference between similarity search and reranking? (4) When would you use Pinecone vs Supabase? (5) Why is RAG consistently the highest-paying AI automation skill? Answers in expandable sections.' },
              { id: 'CH-504', title: 'Share Your Day 5 Build', type: 'action', youtube: null, description: 'Post your RAG agent in action with: (1) What documents you loaded. (2) A question you asked and the answer it returned. (3) Whether the answer was accurate (and if not, what went wrong). (4) How many documents/chunks your system is working with. Tag #Day5. RAG builds are the most impressive to potential clients \u2014 save this for your portfolio.' }
            ]
          }
        ]

      {
        day: 6, title: 'Multi-Agent & Advanced Systems', icon: '\u2699\uFE0F', color: '#ec4899',
        subtitle: 'Build systems where multiple AI agents collaborate, delegate, and solve problems together',
        sections: [
          {
            name: 'Learn',
            items: [
              { id: 'CH-601', title: 'When One Agent Isn\'t Enough: Multi-Agent Thinking', type: 'lesson', youtube: null, description: 'Single agents hit a ceiling. They\'re great at focused tasks, but struggle with complex multi-step problems that require different types of expertise. Multi-agent systems solve this by splitting complex work across specialized agents that collaborate. Think of it like a team: you wouldn\'t hire one person to do marketing, sales, engineering, and support. You\'d hire specialists. Same principle applies to AI. Today you\'ll learn three multi-agent patterns: (1) Pipeline \u2014 agents process data in sequence, each adding value. (2) Orchestrator \u2014 one manager agent delegates to specialist agents. (3) Swarm \u2014 agents work in parallel and merge their results. Each pattern is suited to different problems.' },
              { id: 'FT-033', title: 'Multi-Agent System Design', type: 'video', youtube: '0iUNOmeU7O4', description: 'Nate walks through the why and how of multi-agent systems in n8n. Covers the real benefits (specialization, parallel processing, easier debugging) and the real costs (more complex, harder to test, more API calls). The key takeaway: don\'t use multi-agent systems because they sound impressive \u2014 use them when a single agent genuinely can\'t handle the complexity. This video shows you how to make that decision and how to architect the system once you\'ve decided.' },
              { id: 'FT-068', title: 'The 4 Agentic Frameworks You Need to Know', type: 'video', youtube: 'nSQnJoqK4DQ', description: 'Four frameworks for building AI agent systems, each suited to different problems: (1) ReAct (Reasoning + Acting) \u2014 the agent thinks step by step and takes actions based on its reasoning. Best for complex problem-solving. (2) Plan-and-Execute \u2014 the agent creates a full plan first, then executes each step. Best for multi-step tasks with clear goals. (3) Reflection \u2014 the agent reviews its own output and improves it. Best for content generation and quality-critical tasks. (4) Tool Use \u2014 the agent has access to external tools and learns when to use each one. Best for versatile assistants. Understanding these frameworks tells you which pattern to reach for when designing your systems.' }
            ]
          },
          {
            name: 'Build',
            items: [
              { id: 'FT-032', title: 'Project: AI Workflow Generator \u2014 An Agent That Builds Agents', type: 'template', youtube: 'Ik8OHT3w4pE', description: 'Today\'s main build is meta: you\'re building an AI agent that generates n8n workflows from plain English descriptions. A user describes what they want ("build me a workflow that monitors Twitter for mentions and sends a Slack alert"), and your agent generates a complete, working n8n workflow JSON. This uses everything from the challenge: Claude Code for the build process, n8n for the runtime, and multi-agent patterns for the architecture (one agent for understanding the request, one for generating the workflow, one for validating it). This is also an extremely sellable tool \u2014 companies pay $5K\u2013$25K+ for custom workflow generators.' },
              { id: 'FT-022', title: 'Build: Agent Swarm Collaboration', type: 'template', youtube: 'vpyllOeLhs4', description: 'Build a swarm of specialized agents that coordinate on complex tasks. The template creates: a Research Agent (finds and summarizes information), an Analysis Agent (identifies patterns and insights), a Writing Agent (produces polished output), and a Manager Agent (coordinates the others and merges results). The swarm pattern is powerful because each agent is simple and focused, but together they handle problems that would overwhelm any single agent. Follow along to build the full swarm, then customize the agent specializations for your own use case.' },
              { id: 'FT-058', title: 'Bonus Build: The Ultimate Team of AI Assistants', type: 'template', youtube: '9FuNtfsnRNo', description: 'A team of AI assistants, each with distinct personalities and skills, coordinated by a manager agent. The manager analyzes incoming requests, determines which assistant(s) are needed, delegates the work, collects results, and delivers a unified response. This is the most impressive demo build in the entire challenge \u2014 when you show a client a team of AI agents working together on their problem, it changes the conversation from "can AI do this?" to "when can we start?"' }
            ]
          },
          {
            name: 'Go Deeper',
            items: [
              { id: 'FT-057', title: 'Human-in-the-Loop Sales Team', type: 'template', youtube: 'FcAAlOw6KZ8', description: 'A multi-agent sales system with a critical addition: human approval gates at key decision points. The AI agents handle research, drafting, and scheduling, but a human reviews and approves before anything is sent to a prospect. This is the pattern that makes multi-agent systems safe for business-critical processes. Every client project should include human-in-the-loop checkpoints.' },
              { id: 'FT-034', title: 'Browser Agent: Web Automation with AI', type: 'template', youtube: 'ar37oypyATQ', description: 'Build an agent that can browse the web like a human: navigate pages, fill forms, click buttons, extract data, and take screenshots. Uses browser automation tools connected through n8n. Powerful for scraping dynamic websites, monitoring competitor pages, or automating repetitive web tasks that don\'t have APIs.' },
              { id: 'FT-043', title: 'AI Marketing Team', type: 'template', youtube: 'ldETapkr8Hg', description: 'A complete AI marketing department: a Content Agent that writes blog posts and social media, a Strategy Agent that analyzes performance data and suggests optimizations, a Scheduling Agent that publishes at optimal times, and a Reporting Agent that generates weekly summaries. This is a real product that agencies are starting to offer as a service. Build it here, sell it to a marketing team later.' },
              { id: 'FT-062', title: 'Research & Content Creation Pipeline', type: 'template', youtube: 'u2Tuu02r7QI', description: 'Agents that research a topic deeply (searching the web, reading articles, synthesizing information) and then produce original, well-sourced content. The pipeline: Topic Input \u2192 Research Agent (gathers sources) \u2192 Analysis Agent (identifies key points) \u2192 Writing Agent (produces the content) \u2192 Quality Agent (checks accuracy and readability). Each agent is a separate n8n workflow connected through webhooks.' }
            ]
          },
          {
            name: 'Checkpoint',
            items: [
              { id: 'CH-602', title: 'Day 6 Knowledge Check', type: 'quiz', youtube: null, description: '(1) What are the three multi-agent patterns and when do you use each? (2) Name the four agentic frameworks from the video and give a use case for each. (3) Why should every client-facing multi-agent system include human-in-the-loop gates? (4) What\'s the difference between a Pipeline and a Swarm pattern? (5) When should you NOT use a multi-agent system? Answers in expandable sections.' },
              { id: 'CH-603', title: 'Share Your Day 6 Build', type: 'action', youtube: null, description: 'Today\'s build is the most complex yet. Post: (1) A diagram or screenshot of your multi-agent system architecture. (2) What each agent is responsible for. (3) How they communicate with each other. (4) The most surprising thing about building a multi-agent system. Tag #Day6. This is absolutely portfolio material \u2014 multi-agent builds are rare in the wild and impressive to clients.' }
            ]
          }
        ]

      {
        day: 7, title: 'Self-Healing Systems & Capstone', icon: '\uD83C\uDFC6', color: '#f97316',
        subtitle: 'Build production-grade systems that detect and fix their own errors \u2014 the capstone of everything you\'ve learned',
        sections: [
          {
            name: 'Learn',
            items: [
              { id: 'CC-004', title: 'Self-Healing n8n Workflows', type: 'video', youtube: '7PGKbJFZTak', description: 'The crown jewel of the challenge. Nate builds a workflow that monitors itself for errors, diagnoses what went wrong, uses Claude Code to generate a fix, applies the fix, and re-runs the failed step \u2014 all without human intervention. This is the most advanced pattern in n8n automation and the one that commands the highest prices from clients. A system that never breaks (or fixes itself when it does) is worth an order of magnitude more than one that requires manual monitoring. Watch this video carefully \u2014 you\'re building this today.' },
              { id: 'CH-701', title: 'Production-Grade Architecture: What Separates Demos from Real Systems', type: 'lesson', youtube: null, description: 'Everything you\'ve built so far works. But "works on my machine" and "runs reliably in production for a client" are very different things. This lesson covers the five pillars of production-grade automation: (1) Monitoring \u2014 knowing when something fails before the client does. (2) Logging \u2014 recording enough information to diagnose problems after the fact. (3) Error Recovery \u2014 automatic retry logic, fallback paths, and graceful degradation. (4) Security \u2014 credential management, webhook auth, and data handling. (5) Scalability \u2014 designing workflows that handle 10 requests the same as 10,000. You don\'t need all five for a demo. You need all five for anything a client is paying for.' },
              { id: 'CH-702', title: 'Error Detection & Auto-Recovery: The Patterns', type: 'lesson', youtube: null, description: 'Three patterns for self-healing systems: (1) Retry with Backoff \u2014 if a step fails, wait and try again with increasing delays. Handles transient errors like API timeouts. (2) Error Classification + Fix \u2014 catch the error, classify what type it is (auth, data, timeout, logic), and apply a type-specific fix. This is where Claude Code shines \u2014 you can use it to analyze error messages and generate targeted fixes. (3) Watchdog Process \u2014 a separate workflow that monitors your other workflows, detects anomalies (like a workflow that should run every hour but hasn\'t run in 3 hours), and takes corrective action. The capstone build combines all three.' }
            ]
          },
          {
            name: 'Build',
            items: [
              { id: 'CH-703', title: 'Capstone: Self-Healing Workflow System', type: 'build', youtube: null, description: 'Your final build. Construct a self-healing system with three components: (1) A "target workflow" \u2014 pick any workflow you\'ve built this week (email agent, RAG system, etc.). (2) An "error detection" workflow that monitors the target for failures, catches error details, and logs them. (3) A "self-repair" workflow that receives error information, uses Claude Code (via API) to diagnose the issue and generate a fix, applies the fix to the target workflow, and re-triggers the failed execution. To test it: intentionally break your target workflow (wrong API key, invalid data, missing node configuration) and watch the self-healing system detect and fix the issue automatically. This is the most impressive thing most people have ever built with AI. Estimated time: 90\u2013120 minutes.' },
              { id: 'FT-041', title: 'Build: Comprehensive Agent Logging', type: 'template', youtube: 'vVdS-ZEFf50', description: 'Before your system can heal itself, it needs to know what\'s happening. This template builds a logging system that tracks every action your agents take: what was requested, what was attempted, what succeeded, what failed, and how long each step took. Logs are stored in a structured format (Google Sheets, Supabase, or n8n Data Tables) that your error detection workflow can query. Without good logging, debugging is guesswork. With it, every problem is traceable.' },
              { id: 'FT-016', title: 'Build: Automated Workflow Evaluation', type: 'template', youtube: '-zFd1nPn6U0', description: 'Build an evaluation pipeline that automatically tests your workflows against known inputs and expected outputs. Think of it as unit testing for n8n: you define test cases, the evaluation workflow runs each one, compares actual vs. expected results, and flags any discrepancies. This is powerful for catching regressions \u2014 when a fix for one bug accidentally breaks something else. Run evaluations after every self-healing repair to make sure the fix didn\'t introduce new problems.' }
            ]
          },
          {
            name: 'Go Deeper',
            items: [
              { id: 'FT-027', title: 'Parallelization & Subworkflows', type: 'template', youtube: 'qNW9KaLe1nY', description: 'As your systems get more complex, they need to run faster. This template teaches you two scaling patterns: (1) Parallelization \u2014 splitting work into independent chunks and processing them simultaneously. A batch of 100 emails that takes 10 minutes sequentially can run in 1 minute in parallel. (2) Subworkflows \u2014 breaking large workflows into modular, reusable sub-workflows that you can test and maintain independently. Both patterns are essential for production systems that handle real volume.' },
              { id: 'FT-007', title: 'Guardrails: Safety & Output Validation', type: 'template', youtube: 'oWdJMJp2HgM', description: 'AI agents can generate harmful, incorrect, or off-brand content. Guardrails are validation layers that check agent outputs before they reach users. This template covers: content safety filters, output format validation, confidence thresholds (if the AI isn\'t confident, route to human review), rate limiting to prevent runaway agents, and cost caps to prevent unexpected API bills. Critical for any agent that interacts with customers or produces public-facing content.' },
              { id: 'FT-047', title: 'Supabase & Postgres for Production Data', type: 'template', youtube: 'JjBofKJnYIU', description: 'Google Sheets works for demos. Production systems need real databases. This template connects n8n to Supabase (hosted Postgres) for structured data storage: logging, user data, configuration, and state management. You\'ll learn how to create tables, write queries, and handle database operations from n8n workflows. If you\'re building systems for clients, this is the data layer they expect.' }
            ]
          },
          {
            name: 'Challenge Complete',
            items: [
              { id: 'CH-704', title: 'Day 7 Knowledge Check (Final)', type: 'quiz', youtube: null, description: '(1) What are the five pillars of production-grade automation? (2) Describe the three self-healing patterns and when each is appropriate. (3) Why is logging critical for self-healing systems? (4) What should an evaluation pipeline test after every self-repair? (5) If a client asks "what happens when the system breaks?" \u2014 what\'s your answer now? Answers in expandable sections.' },
              { id: 'CH-705', title: 'Submit Your Capstone Build', type: 'action', youtube: null, description: 'This is it. Post your capstone in the community with: (1) A screenshot or diagram of your self-healing system architecture. (2) A description of the three components (target, detector, repairer). (3) A video or series of screenshots showing the system detect and fix a real error. (4) A reflection: compare your Day 1 workflow to your Day 7 capstone. How far have you come? Tag #Day7 and #Capstone. Nate personally reviews every capstone submission.' },
              { id: 'CH-706', title: 'Claim Your Challenge Rewards', type: 'reward', youtube: null, description: 'You finished. Seven days. Seven builds. From installing Claude Code to building self-healing production systems. Here\'s how to claim your rewards: (1) Click the Google Form link below. (2) Submit proof of your 7 completed builds (screenshots or community post links). (3) Within 48 hours, you\'ll receive: your Hall of Builders listing, partner discount codes (Airtop, Apify, Blotato, Firecrawl, Hostinger, Lindy, Twitter Scraper, Poppy AI), and an exclusive AIS+ discount code that isn\'t available anywhere else. You earned this.' },
              { id: 'CH-707', title: 'Your Path Forward: What to Do Next', type: 'lesson', youtube: null, description: 'You\'re no longer a beginner. Here\'s where to go from here based on your goals: (A) Want to go deeper technically? \u2192 Claude Code Mastery module has deep-dive references for everything you learned. The Skills Library has downloadable templates you can use in your own projects. (B) Want to build more? \u2192 The n8n Template Library has 70+ templates organized by category. Build one a day and you\'ll have an incredible portfolio within a month. (C) Want to make money with this? \u2192 AIS+ is where members learn to find clients, price projects, and deliver AI automation as a service. Members like Aidan ($14K contract), Mike ($6K first client), and Jose ($500 first audit) started exactly where you are now. The skills you\'ve built this week are commercially valuable. The question is whether you want to sell them.' }
            ]
          }
        ]
      }

// =====================================================
// RENDER ENGINE
// =====================================================

const SECTION_LABELS = {
  'getting-started': 'Getting Started',
  'core-curriculum': 'Core Curriculum',
  'library-resources': 'Library & Resources',
  'ais-plus': 'AIS+ Membership'
};

let currentModule = null;
let currentLesson = null;

function extractVideoId(url) {
  if (!url) return null;
  const match = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return match ? match[1] : url.length === 11 ? url : null;
}

function getLevelPipClass(level) {
  if (!level) return '';
  const l = level.toLowerCase();
  if (l === 'advanced') return 'advanced';
  if (l.includes('intermediate+') || l === 'intermediate+') return 'intermediate-plus';
  if (l.includes('intermediate')) return 'intermediate';
  if (l.includes('beginner+') || l === 'beginner+') return 'beginner-plus';
  if (l.includes('beginner')) return 'beginner';
  return '';
}

function getLevelPipLabel(level) {
  if (!level) return '';
  const l = level.toLowerCase();
  if (l === 'advanced') return 'ADV';
  if (l === 'intermediate+' || l.includes('intermediate+')) return 'INT+';
  if (l.includes('intermediate')) return 'INT';
  if (l === 'beginner+' || l.includes('beginner+')) return 'BEG+';
  if (l.includes('beginner')) return 'BEG';
  return '';
}

function renderSidebar() {
  var nav = document.getElementById('sidebar-nav');
  var html = '';
  var lastSection = '';

  MODULES.forEach(function(mod, mi) {
    if (mod.section !== lastSection) {
      html += '<div class="phase-divider">' + SECTION_LABELS[mod.section] + '</div>';
      lastSection = mod.section;
    }

    var lessonCount = mod.lessons ? mod.lessons.length :
                      mod.isChallenge ? mod.days.reduce(function(s,d) { return s + d.sections.reduce(function(ss,sec) { return ss + sec.items.length; }, 0); }, 0) :
                      mod.isLibrary ? mod.categories.reduce(function(s,c) { return s + c.templates.length; }, 0) :
                      mod.isSpecial === 'discussions' ? mod.discussions.length :
                      mod.isSpecial === 'podcast' ? mod.episodes.length :
                      mod.isSpecial === 'discounts' ? mod.discounts.length :
                      mod.isSpecial === 'success-stories' ? mod.stories.length :
                      1;

    html += '<div class="module-group" data-module="' + mi + '">';
    html += '<div class="module-header" onclick="toggleModule(' + mi + ')">';
    html += '<div class="module-icon" style="background:' + mod.iconBg + '">' + mod.icon + '</div>';
    html += '<div class="module-name">' + mod.name + '</div>';

    if (mod.hasReward) {
      html += '<span class="module-badge reward">\uD83C\uDFC6 Rewards</span>';
    }
    if (mod.isPaid) {
      html += '<span class="module-badge paid">PAID</span>';
    }

    html += '<div class="module-count">' + lessonCount + '</div>';
    html += '<div class="chevron">\u25B6</div>';
    html += '</div>';
    html += '<div class="module-lessons">';

    if (mod.lessons) {
      mod.lessons.forEach(function(lesson, li) {
        var levelCls = lesson.levelKey ? lesson.levelKey : getLevelPipClass(lesson.level);
        var levelLabel = lesson.levelKey ? getLevelPipLabel(lesson.level) : '';

        html += '<div class="lesson-item" data-module="' + mi + '" data-lesson="' + li + '" onclick="selectLesson(' + mi + ',' + li + ')">';
        html += '<span class="lesson-num">' + (lesson.isOverview ? '0' : li) + '</span>';
        html += '<span class="lesson-label">' + lesson.title + '</span>';

        if (lesson.comingSoon) {
          html += '<span class="level-pip coming-soon">SOON</span>';
        } else if (lesson.levelKey && levelLabel) {
          html += '<span class="level-pip ' + levelCls + '">' + levelLabel + '</span>';
        }

        html += '</div>';
      });
    } else if (mod.isChallenge) {
      mod.days.forEach(function(day, di) {
        var itemCount = day.sections.reduce(function(s,sec) { return s + sec.items.length; }, 0);
        html += '<div class="lesson-item" data-module="' + mi + '" data-day="' + di + '" onclick="selectDay(' + mi + ',' + di + ')" style="font-weight:600;color:var(--text)">';
        html += '<span class="lesson-num" style="background:' + day.color + ';color:#fff;min-width:22px;text-align:center;border-radius:4px;padding:1px 4px;font-size:10px">' + (day.day === 0 ? 'HQ' : day.day) + '</span>';
        html += '<span style="flex:1">' + day.icon + ' ' + day.title + '</span>';
        html += '<span style="font-size:11px;color:var(--text-muted)">' + itemCount + '</span>';
        html += '</div>';
      });
    } else if (mod.isLibrary) {
      mod.categories.forEach(function(cat, ci) {
        html += '<div class="lesson-item" data-module="' + mi + '" data-cat="' + ci + '" onclick="selectCategory(' + mi + ',' + ci + ')" style="font-weight:600;color:var(--text)">';
        html += '<span class="lesson-num">' + cat.templates.length + '</span> ' + cat.name;
        html += '</div>';
      });
    } else if (mod.isSpecial === 'podcast') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'podcast\')"><span class="lesson-num">' + mod.episodes.length + '</span> Episodes</div>';
    } else if (mod.isSpecial === 'discounts') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'discounts\')"><span class="lesson-num">' + mod.discounts.length + '</span> Partner Codes</div>';
    } else if (mod.isSpecial === 'discussions') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'discussions\')"><span class="lesson-num">' + mod.discussions.length + '</span> Discussions</div>';
    } else if (mod.isSpecial === 'success-stories') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'stories\')"><span class="lesson-num">' + mod.stories.length + '</span> Member Stories</div>';
    } else if (mod.isSpecial === 'upsell') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'upsell\')"><span class="lesson-num">\u2192</span> What\'s Inside AIS+</div>';
    }

    html += '</div></div>';
  });

  nav.innerHTML = html;
}

function toggleModule(mi) {
  var group = document.querySelector('.module-group[data-module="' + mi + '"]');
  group.classList.toggle('open');
}

function selectLesson(mi, li) {
  currentModule = mi;
  currentLesson = li;

  document.querySelectorAll('.lesson-item').forEach(function(el) { el.classList.remove('active'); });
  var item = document.querySelector('.lesson-item[data-module="' + mi + '"][data-lesson="' + li + '"]');
  if (item) item.classList.add('active');

  var mod = MODULES[mi];
  var lesson = mod.lessons[li];
  renderLesson(mod, lesson, li);
}

function renderLesson(mod, lesson, li) {
  var main = document.getElementById('main-content');
  var videoId = extractVideoId(lesson.youtube);

  var html = '<div class="lesson-view">';
  html += '<div class="lesson-breadcrumb">' + mod.name + ' <span>\u2192 ' + (lesson.isOverview ? 'Overview' : 'Lesson ' + li) + '</span></div>';
  html += '<h1 class="lesson-title">' + lesson.title + '</h1>';

  // Meta tags
  html += '<div class="lesson-meta">';
  html += '<span class="meta-tag id">' + lesson.id + '</span>';
  if (lesson.level) html += '<span class="meta-tag level">' + lesson.level + '</span>';
  if (lesson.comingSoon) html += '<span class="meta-tag coming-soon">COMING SOON</span>';
  if (lesson.youtube || lesson.videoType === 'loom') html += '<span class="meta-tag video">\u25B6 Video</span>';
  if (lesson.hasTemplate) html += '<span class="meta-tag template">\u2B07 Template</span>';
  if (lesson.hasGuide) html += '<span class="meta-tag guide">\uD83D\uDCC4 Guide</span>';
  html += '</div>';

  // Reward banner for challenge lessons
  if (mod.hasReward && lesson.isOverview) {
    html += '<div class="reward-banner">';
    html += '<div class="reward-icon">\uD83C\uDFC6</div>';
    html += '<div class="reward-text">';
    html += '<div class="reward-title">Challenge Rewards</div>';
    html += '<div class="reward-desc">Complete all 7 days to unlock exclusive rewards. Download the Progress Tracker to track your completion.</div>';
    html += '</div>';
    html += '</div>';
  }

  // Video

  }

  // Takeaways
  if (lesson.takeaways && lesson.takeaways.length) {
    html += '<div class="content-section takeaways"><h2><span class="section-icon">\u2726</span> Key Takeaways</h2><ul>';

  // Resources
  if (lesson.resources && lesson.resources.length) {
    html += '<div class="content-section"><h2><span class="section-icon">\uD83D\uDCE6</span> Resources</h2>';
    html += '<div class="resource-cards">';

    html += '<div class="content-section"><h2><span class="section-icon">\uD83D\uDCE6</span> Resources</h2>';

    html += '</div></div>';
  }

  // Social proof
  if (lesson.proof) {
    html += '<div class="callout proof"><p><strong>Community proof:</strong> ' + lesson.proof + '</p></div>';
  }

  // Next step
  if (lesson.nextStep) {
    html += '<div class="next-step-card" onclick="goNext(' + currentModule + ', ' + li + ')">';
    html += '<div class="next-label">Next Step</div>';
    html += '<div class="next-title">' + lesson.nextStep + '</div>';
    html += '</div>';
  }

  html += '</div>';
  main.innerHTML = html;
  main.scrollTop = 0;
}

function goNext(mi, li) {
  var mod = MODULES[mi];
  if (mod.lessons && li + 1 < mod.lessons.length) {

function navigateToModule(mi) {
  var group = document.querySelector('.module-group[data-module="' + mi + '"]');
  if (group && !group.classList.contains('open')) group.classList.add('open');
  var mod = MODULES[mi];
  if (mod.isChallenge) {
    selectDay(mi, 0);
  } else if (mod.isSpecial === 'success-stories') {
    selectSpecial(mi, 'stories');
  } else if (mod.isSpecial) {
    selectSpecial(mi, mod.isSpecial);
  } else if (mod.lessons) {
    selectLesson(mi, 0);
  }
}

    html += '<p style="color:var(--text-muted);margin-bottom:32px;font-size:15px">Real members. Real results. These builders were exactly where you are now.</p>';
    html += '<div class="template-grid">';
    mod.stories.forEach(function(s) {
      html += '<div class="template-card" onclick="window.open(\'' + s.skoolUrl + '\', \'_blank\')">';
      html += '<div style="font-size:28px;font-weight:800;color:var(--green);margin-bottom:8px">' + s.amount + '</div>';
      html += '<div class="tc-name">' + s.title + '</div>';
      html += '<div style="font-size:12px;color:var(--text-muted);margin:6px 0 10px;line-height:1.5">' + s.desc + '</div>';
      html += '<div style="font-size:12px;font-weight:600;color:var(--accent)">Watch Story \u2192</div>';
      html += '</div>';
    });
    html += '</div></div>';
    main.innerHTML = html;
    main.scrollTop = 0;
    return;
  }

  // Discussions (refactored community)
  var html = '<div class="lesson-view">';
  html += '<div class="lesson-breadcrumb">' + mod.name + '</div>';

  if (section === 'discussions') {
    html += '<h1 class="lesson-title">Community Discussions</h1>';
    html += '<p style="color:var(--text-muted);margin-bottom:24px">Engage with the community. Share your thoughts, learn from others.</p>';
    mod.discussions.forEach(function(d) {
      html += '<div class="template-card" style="margin-bottom:8px"><div class="tc-id">' + d.id + '</div><div class="tc-name">' + d.title + '</div></div>';
    });
  }

  html += '</div>';
  main.innerHTML = html;
  main.scrollTop = 0;
}

function renderWelcome() {
  var main = document.getElementById('main-content');
  var totalTemplates = 0;
  MODULES.forEach(function(m) { if (m.isLibrary && !m.libraryType) m.categories.forEach(function(c) { totalTemplates += c.templates.length; }); });

  var totalLessons = 0;
  MODULES.forEach(function(m) { if (m.lessons) totalLessons += m.lessons.length; });

  var html = '<div class="welcome-view">';
  html += '<h1>AI Automation Society</h1>';
  html += '<div class="welcome-sub">Your structured path from zero to building and selling AI automations with Claude Code. Start with the fundamentals, build real projects in the 7-Day Challenge, then go deeper with mastery modules and templates.</div>';

  html += '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-num">10</div><div class="stat-label">Modules</div></div>';
  html += '<div class="stat-card"><div class="stat-num">' + totalLessons + '</div><div class="stat-label">Lessons</div></div>';
  html += '<div class="stat-card"><div class="stat-num">' + totalTemplates + '</div><div class="stat-label">Templates</div></div>';
  html += '<div class="stat-card"><div class="stat-num">7</div><div class="stat-label">Day Challenge</div></div>';
  html += '</div>';

  html += '<div class="reward-banner" style="max-width:500px;margin:0 auto 40px">';
  html += '<div class="reward-icon">\uD83C\uDFC6</div>';
  html += '<div class="reward-text">';
  html += '<div class="reward-title">7-Day Claude Code Builder Challenge</div>';
  html += '<div class="reward-desc">Complete all 7 days to unlock exclusive rewards. Build real projects with Claude Code + n8n.</div>';
  html += '</div>';
  html += '</div>';

  html += '<div class="roadmap"><h2>Your Learning Path</h2>';

  // Getting Started
  var gettingStarted = MODULES.filter(function(m) { return m.section === 'getting-started'; });
  html += '<div class="roadmap-phase"><h3>Getting Started</h3>';
  var globalNum = 1;
  gettingStarted.forEach(function(m) {
    var count = m.lessons ? m.lessons.length : 0;
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    if (m.hasReward) html += '<span class="ri-badge" style="background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)">\uD83C\uDFC6 Rewards</span>';
    html += '<div class="ri-count">' + count + ' lessons</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div>';

  // Core Curriculum
  var coreCurriculum = MODULES.filter(function(m) { return m.section === 'core-curriculum'; });
  html += '<div class="roadmap-phase"><h3>Core Curriculum</h3>';
  coreCurriculum.forEach(function(m) {
    var count = m.lessons ? m.lessons.length : m.isChallenge ? m.days.length + ' days, ' + m.days.reduce(function(s,d) { return s + d.sections.reduce(function(ss,sec) { return ss + sec.items.length; }, 0); }, 0) : m.isLibrary ? m.categories.reduce(function(s,c) { return s + c.templates.length; }, 0) : 0;
    var label = m.lessons ? 'lessons' : m.isChallenge ? 'items' : m.isLibrary ? 'items' : 'items';
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    if (m.hasReward) html += '<span class="ri-badge" style="background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)">\uD83C\uDFC6 Rewards</span>';
    html += '<div class="ri-count">' + count + ' ' + label + '</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div>';

  // Library & Resources
  var libraryResources = MODULES.filter(function(m) { return m.section === 'library-resources'; });
  html += '<div class="roadmap-phase"><h3>Library & Resources</h3>';
  libraryResources.forEach(function(m) {
    var count = m.isLibrary ? totalTemplates : m.isSpecial === 'podcast' ? m.episodes.length : m.isSpecial === 'discounts' ? m.discounts.length : m.isSpecial === 'discussions' ? m.discussions.length : 0;
    var label = m.isLibrary ? 'templates' : m.isSpecial === 'podcast' ? 'episodes' : m.isSpecial === 'discounts' ? 'codes' : m.isSpecial === 'discussions' ? 'discussions' : 'items';
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    html += '<div class="ri-count">' + count + ' ' + label + '</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div>';

  // AIS+ Membership
  var aisPlus = MODULES.filter(function(m) { return m.section === 'ais-plus'; });
  html += '<div class="roadmap-phase"><h3>AIS+ Membership</h3>';
  aisPlus.forEach(function(m) {
    var count = m.isSpecial === 'success-stories' ? m.stories.length : 1;
    var label = m.isSpecial === 'success-stories' ? 'stories' : 'items';
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    if (m.isPaid) html += '<span class="ri-badge" style="background:rgba(167,139,250,0.15);color:var(--purple);border:1px solid rgba(167,139,250,0.3)">PAID</span>';
    html += '<div class="ri-count">' + count + ' ' + label + '</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div></div>';

  html += '</div>';
  main.innerHTML = html;
}

// =====================================================
// INIT
// =====================================================

renderSidebar();
renderWelcome();
</script>

</body>
</html>
