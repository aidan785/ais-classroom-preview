<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIS Free Classroom — Prototype v2</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --border: #333;
    --text: #e8e8e8;
    --text-muted: #999;
    --text-dim: #666;
    --accent: #4f8fff;
    --accent-hover: #6ba1ff;
    --green: #34d399;
    --orange: #f59e0b;
    --red: #ef4444;
    --purple: #a78bfa;
    --gold: #fbbf24;
    --sidebar-w: 320px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .sidebar-header .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .sidebar-header .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 8px;
  }

  .sidebar-actions {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tracker-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 8px 12px;
    background: linear-gradient(135deg, #1a2d1a 0%, #1a2744 100%);
    border: 1px solid rgba(79, 143, 255, 0.25);
    border-radius: 8px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .tracker-btn:hover {
    border-color: var(--accent);
    background: linear-gradient(135deg, #1a2d1a 0%, #1a3055 100%);
  }

  .tracker-btn .tracker-icon { font-size: 14px; }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .sidebar-nav::-webkit-scrollbar { width: 6px; }
  .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .module-group { margin-bottom: 4px; }

  .module-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }

  .module-header:hover { background: var(--surface2); }

  .module-header .module-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .module-header .module-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .module-header .module-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .module-badge.reward {
    background: rgba(251, 191, 36, 0.15);
    color: var(--gold);
    border: 1px solid rgba(251, 191, 36, 0.3);
  }

  .module-badge.paid {
    background: rgba(167, 139, 250, 0.15);
    color: var(--purple);
    border: 1px solid rgba(167, 139, 250, 0.3);
  }

  .module-header .module-count {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface3);
    padding: 1px 7px;
    border-radius: 8px;
  }

  .module-header .chevron {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }

  .module-group.open .chevron { transform: rotate(90deg); }

  .module-lessons {
    display: none;
    padding: 0 0 4px 0;
  }

  .module-group.open .module-lessons { display: block; }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px 7px 54px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .lesson-item:hover { background: var(--surface2); color: var(--text); }
  .lesson-item.active { background: var(--surface3); color: var(--accent); }

  .lesson-item .lesson-num {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 18px;
    flex-shrink: 0;
  }

  .lesson-item .lesson-label {
    flex: 1;
  }

  .lesson-item .level-pip {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .level-pip.beginner { background: rgba(52, 211, 153, 0.15); color: var(--green); }
  .level-pip.beginner-plus { background: rgba(52, 211, 153, 0.15); color: #5ee6b5; }
  .level-pip.intermediate { background: rgba(79, 143, 255, 0.15); color: var(--accent); }
  .level-pip.intermediate-plus { background: rgba(167, 139, 250, 0.15); color: var(--purple); }
  .level-pip.advanced { background: rgba(239, 68, 68, 0.15); color: var(--red); }
  .level-pip.coming-soon { background: rgba(102, 102, 102, 0.2); color: var(--text-dim); }

  .phase-divider {
    padding: 16px 16px 6px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }

  /* ── Main Content ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .main::-webkit-scrollbar { width: 8px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .lesson-view {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 48px 80px;
  }

  .lesson-breadcrumb {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .lesson-breadcrumb span { color: var(--text-muted); }

  .lesson-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
    line-height: 1.25;
  }

  .lesson-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .meta-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 500;
  }

  .meta-tag.id { background: var(--surface3); color: var(--text-muted); }
  .meta-tag.level { background: #1a2744; color: var(--accent); }
  .meta-tag.video { background: #1f2d1a; color: var(--green); }
  .meta-tag.template { background: #2d2a1a; color: var(--orange); }
  .meta-tag.guide { background: #2a1a2d; color: var(--purple); }
  .meta-tag.coming-soon { background: #2e2e2e; color: var(--text-dim); border: 1px dashed var(--text-dim); }
  .meta-tag.reward { background: rgba(251, 191, 36, 0.1); color: var(--gold); }

  .video-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 32px;
    border: 1px solid var(--border);
  }

  .video-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 0;
  }

  .video-thumb {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    text-decoration: none;
  }

  .video-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.2s, filter 0.2s;
  }

  .video-thumb:hover img {
    transform: scale(1.03);
    filter: brightness(0.7);
  }

  .video-thumb .play-btn {
    position: absolute;
    width: 72px; height: 50px;
    background: rgba(255,0,0,0.85);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .video-thumb:hover .play-btn {
    background: rgba(255,0,0,1);
    transform: scale(1.08);
  }

  .play-btn::after {
    content: '';
    display: block;
    width: 0; height: 0;
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent #fff;
    margin-left: 3px;
  }

  .video-placeholder {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    color: var(--text-dim);
  }

  .video-placeholder .play-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .video-placeholder span { font-size: 14px; }

  .content-section {
    margin-bottom: 32px;
  }

  .content-section h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .content-section h2 .section-icon {
    font-size: 16px;
  }

  .content-section p {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .content-section ul {
    list-style: none;
    padding: 0;
  }

  .content-section ul li {
    position: relative;
    padding: 8px 0 8px 24px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-muted);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .content-section ul li:last-child { border-bottom: none; }

  .content-section ul li::before {
    content: '\2192';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 600;
  }

  .content-section.takeaways ul li::before { content: '\2726'; color: var(--green); }
  .content-section.actions ul li::before { content: '\2610'; color: var(--orange); }

  .callout {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 16px 20px;
    margin: 20px 0;
  }

  .callout.proof {
    border-left-color: var(--green);
  }

  .callout.reward {
    border-left-color: var(--gold);
    background: rgba(251, 191, 36, 0.05);
  }

  .callout p {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-muted);
    margin: 0;
  }

  .callout strong { color: var(--text); }

  .next-step-card {
    background: linear-gradient(135deg, #1a2744 0%, #1a1a2e 100%);
    border: 1px solid rgba(79, 143, 255, 0.2);
    border-radius: 12px;
    padding: 24px;
    margin-top: 32px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .next-step-card:hover { border-color: var(--accent); }

  .next-step-card .next-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .next-step-card .next-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  .resource-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .resource-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .resource-card:hover { border-color: var(--accent); }

  .resource-card .rc-icon { font-size: 24px; margin-bottom: 8px; }
  .resource-card .rc-label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  .resource-card .rc-name { font-size: 14px; font-weight: 600; color: var(--text); }

  /* ── Welcome/Landing View ── */
  .welcome-view {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 48px;
    text-align: center;
  }

  .welcome-view h1 {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff 0%, #999 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome-view .welcome-sub {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 560px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 16px;
  }

  .stat-card .stat-num {
    font-size: 32px;
    font-weight: 800;
    color: var(--accent);
  }

  .stat-card .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .roadmap {
    text-align: left;
    margin-top: 48px;
  }

  .roadmap h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
    text-align: center;
  }

  .roadmap-phase {
    margin-bottom: 32px;
  }

  .roadmap-phase h3 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .roadmap-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .roadmap-item:hover { border-color: var(--accent); background: var(--surface2); }

  .roadmap-item .ri-num {
    width: 32px; height: 32px;
    background: var(--surface3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .roadmap-item .ri-name { font-size: 15px; font-weight: 600; flex: 1; }
  .roadmap-item .ri-count { font-size: 12px; color: var(--text-dim); }
  .roadmap-item .ri-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Category headers in template library ── */
  .category-header {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin: 32px 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .category-header:first-child { margin-top: 0; }

  .template-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .template-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .template-card:hover { border-color: var(--accent); }

  .template-card .tc-id { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .template-card .tc-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .template-card .tc-level { font-size: 12px; color: var(--accent); }

  /* ── Reward banner ── */
  .reward-banner {
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.08) 0%, rgba(251, 191, 36, 0.02) 100%);
    border: 1px solid rgba(251, 191, 36, 0.25);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .reward-banner .reward-icon { font-size: 24px; }
  .reward-banner .reward-text { flex: 1; }
  .reward-banner .reward-title { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 2px; }
  .reward-banner .reward-desc { font-size: 12px; color: var(--text-muted); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .sidebar { width: 260px; min-width: 260px; }
    .lesson-view { padding: 24px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>AI Automation Society</h1>
    <div class="subtitle">Free Classroom</div>
    <span class="badge">PROTOTYPE v2</span>
  </div>
  <div class="sidebar-actions">
    <button class="tracker-btn" onclick="alert('Download the Progress Tracker spreadsheet to track your 7-Day Challenge completion!')">
      <span class="tracker-icon">&#128202;</span> Download Progress Tracker
    </button>
  </div>
  <div class="sidebar-nav" id="sidebar-nav"></div>
</div>

<div class="main" id="main-content"></div>

<script>
// =====================================================
// DATA - All modules with new structure
// =====================================================

const MODULES = [
  {
    id: 'start-here',
    name: 'Start Here',
    icon: '\uD83D\uDCCD',
    iconBg: '#2d1a1a',
    section: 'getting-started',
    lessons: [
      {
        id: 'SH-001', title: 'Community Rules & Guidelines', level: 'Start', videoType: 'loom',
        hasTemplate: false, hasGuide: false,
        summary: '<p>Welcome to the AI Automation Society. This is the most important lesson in the entire community because it sets the foundation for how we operate. Watch the Loom walkthrough to understand our community standards, how we treat each other, and what\'s expected of you as a member.</p><p>This isn\'t a passive content library \u2014 it\'s an active community of builders. The rules exist to keep things productive, respectful, and focused so everyone can learn faster and build real things.</p>',

      {

        summary: '<p>Every builder gets stuck. The difference between people who stay stuck and people who break through is knowing how to ask the right question. This lesson shows you exactly how to request help inside the community so you get fast, useful answers.</p><p>A good help request includes what you\'re building, what you\'ve tried, where you\'re stuck, and a screenshot or error message. The more specific your question, the faster someone can help you.</p>',

        nextStep: 'Move to Lesson 3: Introduce Yourself'
      },
      {
        id: 'SH-003', title: 'Introduce Yourself', level: 'Start', videoType: 'loom',
        hasTemplate: false, hasGuide: false,
        summary: '<p>Before you start building, take 60 seconds to introduce yourself. Tell us who you are, what brought you here, and what you want to build or achieve with AI automation.</p><p>The members who introduce themselves and engage early are consistently the ones who get the most value out of this community.</p>',

        nextStep: 'Move to Lesson 4: AI Isn\'t Hard. It\'s Misunderstood.'
      },
      {
        id: 'BN-009', title: 'AI Isn\'t Hard. It\'s Misunderstood.', level: 'Beginner \u2192 Intermediate',
        youtube: 'ip8FEYOQob0', hasTemplate: false, hasGuide: true,
        summary: '<p>Most people overcomplicate AI. They chase every new tool, try to build overly complex systems, and burn out before making a dollar. This lesson reframes how you should think about AI automation \u2014 with an emphasis on leverage, simplicity, and process-first thinking.</p><p>The core idea: understand the business problem before you touch any tool. AI automation isn\'t about building the flashiest agent \u2014 it\'s about finding a process that wastes time or money, and eliminating that waste with a simple, reliable workflow.</p>',

        nextStep: 'Move to Lesson 5: How I\'d Learn n8n in 2026'
      },
      {

function extractVideoId(url) {
  if (!url) return null;
  const match = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return match ? match[1] : url.length === 11 ? url : null;
}

function getLevelPipClass(level) {
  if (!level) return '';
  const l = level.toLowerCase();
  if (l === 'advanced') return 'advanced';
  if (l.includes('intermediate+') || l === 'intermediate+') return 'intermediate-plus';
  if (l.includes('intermediate')) return 'intermediate';
  if (l.includes('beginner+') || l === 'beginner+') return 'beginner-plus';
  if (l.includes('beginner')) return 'beginner';
  return '';
}

function getLevelPipLabel(level) {
  if (!level) return '';
  const l = level.toLowerCase();
  if (l === 'advanced') return 'ADV';
  if (l === 'intermediate+' || l.includes('intermediate+')) return 'INT+';
  if (l.includes('intermediate')) return 'INT';
  if (l === 'beginner+' || l.includes('beginner+')) return 'BEG+';
  if (l.includes('beginner')) return 'BEG';
  return '';
}

    }

    var lessonCount = mod.lessons ? mod.lessons.length :
                      mod.isChallenge ? mod.days.reduce(function(s,d) { return s + d.sections.reduce(function(ss,sec) { return ss + sec.items.length; }, 0); }, 0) :
                      mod.isLibrary ? mod.categories.reduce(function(s,c) { return s + c.templates.length; }, 0) :
                      mod.isSpecial === 'discussions' ? mod.discussions.length :
                      mod.isSpecial === 'podcast' ? mod.episodes.length :
                      mod.isSpecial === 'discounts' ? mod.discounts.length :
                      mod.isSpecial === 'success-stories' ? mod.stories.length :
                      1;

    html += '<div class="module-group" data-module="' + mi + '">';
    html += '<div class="module-header" onclick="toggleModule(' + mi + ')">';
    html += '<div class="module-icon" style="background:' + mod.iconBg + '">' + mod.icon + '</div>';
    html += '<div class="module-name">' + mod.name + '</div>';

    if (mod.hasReward) {
      html += '<span class="module-badge reward">\uD83C\uDFC6 Rewards</span>';
    }
    if (mod.isPaid) {
      html += '<span class="module-badge paid">PAID</span>';
    }

    html += '<div class="module-count">' + lessonCount + '</div>';
    html += '<div class="chevron">\u25B6</div>';
    html += '</div>';
    html += '<div class="module-lessons">';

    if (mod.lessons) {
      mod.lessons.forEach(function(lesson, li) {
        var levelCls = lesson.levelKey ? lesson.levelKey : getLevelPipClass(lesson.level);
        var levelLabel = lesson.levelKey ? getLevelPipLabel(lesson.level) : '';

        html += '<div class="lesson-item" data-module="' + mi + '" data-lesson="' + li + '" onclick="selectLesson(' + mi + ',' + li + ')">';
        html += '<span class="lesson-num">' + (lesson.isOverview ? '0' : li) + '</span>';
        html += '<span class="lesson-label">' + lesson.title + '</span>';

        if (lesson.comingSoon) {
          html += '<span class="level-pip coming-soon">SOON</span>';
        } else if (lesson.levelKey && levelLabel) {
          html += '<span class="level-pip ' + levelCls + '">' + levelLabel + '</span>';
        }

        html += '</div>';
      });
    } else if (mod.isChallenge) {
      mod.days.forEach(function(day, di) {
        var itemCount = day.sections.reduce(function(s,sec) { return s + sec.items.length; }, 0);
        html += '<div class="lesson-item" data-module="' + mi + '" data-day="' + di + '" onclick="selectDay(' + mi + ',' + di + ')" style="font-weight:600;color:var(--text)">';
        html += '<span class="lesson-num" style="background:' + day.color + ';color:#fff;min-width:22px;text-align:center;border-radius:4px;padding:1px 4px;font-size:10px">' + (day.day === 0 ? 'HQ' : day.day) + '</span>';
        html += '<span style="flex:1">' + day.icon + ' ' + day.title + '</span>';
        html += '<span style="font-size:11px;color:var(--text-muted)">' + itemCount + '</span>';
        html += '</div>';
      });
    } else if (mod.isLibrary) {
      mod.categories.forEach(function(cat, ci) {
        html += '<div class="lesson-item" data-module="' + mi + '" data-cat="' + ci + '" onclick="selectCategory(' + mi + ',' + ci + ')" style="font-weight:600;color:var(--text)">';
        html += '<span class="lesson-num">' + cat.templates.length + '</span> ' + cat.name;
        html += '</div>';
      });
    } else if (mod.isSpecial === 'podcast') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'podcast\')"><span class="lesson-num">' + mod.episodes.length + '</span> Episodes</div>';
    } else if (mod.isSpecial === 'discounts') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'discounts\')"><span class="lesson-num">' + mod.discounts.length + '</span> Partner Codes</div>';
    } else if (mod.isSpecial === 'discussions') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'discussions\')"><span class="lesson-num">' + mod.discussions.length + '</span> Discussions</div>';
    } else if (mod.isSpecial === 'success-stories') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'stories\')"><span class="lesson-num">' + mod.stories.length + '</span> Member Stories</div>';
    } else if (mod.isSpecial === 'upsell') {
      html += '<div class="lesson-item" onclick="selectSpecial(' + mi + ',\'upsell\')"><span class="lesson-num">\u2192</span> What\'s Inside AIS+</div>';
    }

    html += '</div></div>';
  });

  nav.innerHTML = html;
}

function toggleModule(mi) {
  var group = document.querySelector('.module-group[data-module="' + mi + '"]');
  group.classList.toggle('open');
}

function selectLesson(mi, li) {
  currentModule = mi;
  currentLesson = li;

  document.querySelectorAll('.lesson-item').forEach(function(el) { el.classList.remove('active'); });
  var item = document.querySelector('.lesson-item[data-module="' + mi + '"][data-lesson="' + li + '"]');
  if (item) item.classList.add('active');

  var mod = MODULES[mi];
  var lesson = mod.lessons[li];
  renderLesson(mod, lesson, li);
}

function renderLesson(mod, lesson, li) {
  var main = document.getElementById('main-content');
  var videoId = extractVideoId(lesson.youtube);

  var html = '<div class="lesson-view">';
  html += '<div class="lesson-breadcrumb">' + mod.name + ' <span>\u2192 ' + (lesson.isOverview ? 'Overview' : 'Lesson ' + li) + '</span></div>';
  html += '<h1 class="lesson-title">' + lesson.title + '</h1>';

  // Meta tags
  html += '<div class="lesson-meta">';
  html += '<span class="meta-tag id">' + lesson.id + '</span>';
  if (lesson.level) html += '<span class="meta-tag level">' + lesson.level + '</span>';
  if (lesson.comingSoon) html += '<span class="meta-tag coming-soon">COMING SOON</span>';
  if (lesson.youtube || lesson.videoType === 'loom') html += '<span class="meta-tag video">\u25B6 Video</span>';
  if (lesson.hasTemplate) html += '<span class="meta-tag template">\u2B07 Template</span>';
  if (lesson.hasGuide) html += '<span class="meta-tag guide">\uD83D\uDCC4 Guide</span>';
  html += '</div>';

  // Reward banner for challenge lessons
  if (mod.hasReward && lesson.isOverview) {
    html += '<div class="reward-banner">';
    html += '<div class="reward-icon">\uD83C\uDFC6</div>';
    html += '<div class="reward-text">';
    html += '<div class="reward-title">Challenge Rewards</div>';
    html += '<div class="reward-desc">Complete all 7 days to unlock exclusive rewards. Download the Progress Tracker to track your completion.</div>';
    html += '</div>';
    html += '</div>';
  }

  // Video
  if (!lesson.isOverview || lesson.youtube) {
    html += '<div class="video-container">';
    if (videoId) {
      html += '<a class="video-thumb" href="https://www.youtube.com/watch?v=' + videoId + '" target="_blank" rel="noopener">';
      html += '<img src="https://img.youtube.com/vi/' + videoId + '/maxresdefault.jpg" alt="' + lesson.title + '" onerror="this.src=\'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg\'">';
      html += '<div class="play-btn"></div>';
      html += '</a>';
    } else if (lesson.comingSoon) {
      html += '<div class="video-placeholder"><div class="play-icon">\u25B6</div><span>Coming Soon</span></div>';
    } else {
      html += '<div class="video-placeholder"><div class="play-icon">\u25B6</div><span>' + (lesson.videoType === 'loom' ? 'Loom video (embedded in Skool post)' : 'Video available on Skool') + '</span></div>';
    }
    html += '</div>';
  }

  // Tools
  if (lesson.tools) {
    html += '<div class="callout"><p><strong>Tools used:</strong> ' + lesson.tools + '</p></div>';
  }

  // Summary
  if (lesson.summary) {
    html += '<div class="content-section"><h2><span class="section-icon">\uD83D\uDCDD</span> Summary</h2>' + lesson.summary + '</div>';
  }

  // Takeaways
  if (lesson.takeaways && lesson.takeaways.length) {
    html += '<div class="content-section takeaways"><h2><span class="section-icon">\u2726</span> Key Takeaways</h2><ul>';
    lesson.takeaways.forEach(function(t) { html += '<li>' + t + '</li>'; });
    html += '</ul></div>';
  }

  // Action steps
  if (lesson.actions && lesson.actions.length) {
    html += '<div class="content-section actions"><h2><span class="section-icon">\u2611</span> Action Steps</h2><ul>';
    lesson.actions.forEach(function(a) { html += '<li>' + a + '</li>'; });
    html += '</ul></div>';
  }

  // Resources
  if (lesson.resources && lesson.resources.length) {
    html += '<div class="content-section"><h2><span class="section-icon">\uD83D\uDCE6</span> Resources</h2>';
    html += '<div class="resource-cards">';
    lesson.resources.forEach(function(r) {
      html += '<div class="resource-card"><div class="rc-icon">' + (r.type === 'guide' ? '\uD83D\uDCC4' : '\u2B07') + '</div><div class="rc-label">' + (r.type === 'guide' ? 'PDF Guide' : 'Template') + '</div><div class="rc-name">' + r.name + '</div></div>';
    });
    if (lesson.hasTemplate) {
      html += '<div class="resource-card"><div class="rc-icon">\u2B07</div><div class="rc-label">n8n Template</div><div class="rc-name">' + lesson.title + ' \u2014 JSON</div></div>';
    }
    if (lesson.hasGuide && !lesson.resources.some(function(r) { return r.type === 'guide'; })) {
      html += '<div class="resource-card"><div class="rc-icon">\uD83D\uDCC4</div><div class="rc-label">PDF Guide</div><div class="rc-name">' + lesson.title + ' \u2014 Guide</div></div>';
    }
    html += '</div></div>';
  } else if (lesson.hasTemplate || lesson.hasGuide) {
    html += '<div class="content-section"><h2><span class="section-icon">\uD83D\uDCE6</span> Resources</h2>';
    html += '<div class="resource-cards">';
    if (lesson.hasTemplate) {
      html += '<div class="resource-card"><div class="rc-icon">\u2B07</div><div class="rc-label">n8n Template</div><div class="rc-name">' + lesson.title + ' \u2014 JSON</div></div>';
    }
    if (lesson.hasGuide) {
      html += '<div class="resource-card"><div class="rc-icon">\uD83D\uDCC4</div><div class="rc-label">PDF Guide</div><div class="rc-name">' + lesson.title + ' \u2014 Guide</div></div>';
    }
    html += '</div></div>';
  }

  // Social proof
  if (lesson.proof) {
    html += '<div class="callout proof"><p><strong>Community proof:</strong> ' + lesson.proof + '</p></div>';
  }

  // Next step
  if (lesson.nextStep) {
    html += '<div class="next-step-card" onclick="goNext(' + currentModule + ', ' + li + ')">';
    html += '<div class="next-label">Next Step</div>';
    html += '<div class="next-title">' + lesson.nextStep + '</div>';
    html += '</div>';
  }

  html += '</div>';
  main.innerHTML = html;
  main.scrollTop = 0;
}

function goNext(mi, li) {
  var mod = MODULES[mi];
  if (mod.lessons && li + 1 < mod.lessons.length) {
    selectLesson(mi, li + 1);
  } else if (mi + 1 < MODULES.length && MODULES[mi+1].lessons) {
    var nextGroup = document.querySelector('.module-group[data-module="' + (mi+1) + '"]');
    if (nextGroup && !nextGroup.classList.contains('open')) nextGroup.classList.add('open');
    selectLesson(mi + 1, 0);
  }
}

function selectDay(mi, di) {
  var mod = MODULES[mi];
  var day = mod.days[di];
  var main = document.getElementById('main-content');

  document.querySelectorAll('.lesson-item').forEach(function(el) { el.classList.remove('active'); });
  var item = document.querySelector('.lesson-item[data-module="' + mi + '"][data-day="' + di + '"]');
  if (item) item.classList.add('active');

  var html = '<div class="lesson-view">';

  // Day header with color accent
  html += '<div style="background:linear-gradient(135deg,' + day.color + '22,' + day.color + '08);border:1px solid ' + day.color + '44;border-radius:16px;padding:32px;margin-bottom:32px;text-align:center">';
  html += '<div style="font-size:48px;margin-bottom:8px">' + day.icon + '</div>';
  html += '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:' + day.color + ';margin-bottom:8px">' + (day.day === 0 ? 'Challenge HQ' : 'Day ' + day.day + ' of 7') + '</div>';
  html += '<h1 style="font-size:28px;font-weight:800;color:var(--text);margin:0 0 8px">' + day.title + '</h1>';

  var videoCount = day.sections.reduce(function(s,sec) { return s + sec.items.filter(function(it) { return it.type === 'video'; }).length; }, 0);
  var buildCount = day.sections.reduce(function(s,sec) { return s + sec.items.filter(function(it) { return it.type === 'build' || it.type === 'template'; }).length; }, 0);
  html += '<div style="display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap">';
  html += '<div style="flex:1;min-width:80px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;text-align:center">';
  html += '<div style="font-size:20px;font-weight:800;color:' + day.color + '">' + totalItems + '</div><div style="font-size:11px;color:var(--text-muted)">Total Items</div></div>';
  html += '<div style="flex:1;min-width:80px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;text-align:center">';
  html += '<div style="font-size:20px;font-weight:800;color:' + day.color + '">' + videoCount + '</div><div style="font-size:11px;color:var(--text-muted)">Videos</div></div>';
  html += '<div style="flex:1;min-width:80px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;text-align:center">';
  html += '<div style="font-size:20px;font-weight:800;color:' + day.color + '">' + buildCount + '</div><div style="font-size:11px;color:var(--text-muted)">Builds</div></div>';
  html += '<div style="flex:1;min-width:80px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px;text-align:center">';
  html += '<div style="font-size:20px;font-weight:800;color:' + day.color + '">' + day.sections.length + '</div><div style="font-size:11px;color:var(--text-muted)">Sections</div></div>';
  html += '</div>';

  // Sections
  var typeIcons = { video: '\u25B6', lesson: '\uD83D\uDCD6', build: '\uD83D\uDD28', template: '\u2B07', quiz: '\u2753', action: '\uD83D\uDCAC', resource: '\uD83D\uDCE6', reward: '\uD83C\uDFC6' };
  var typeColors = { video: '#ef4444', lesson: '#3b82f6', build: '#22c55e', template: '#a855f7', quiz: '#f59e0b', action: '#06b6d4', resource: '#6366f1', reward: '#f97316' };
  var typeLabels = { video: 'Video', lesson: 'Lesson', build: 'Build Project', template: 'Template', quiz: 'Knowledge Check', action: 'Community Action', resource: 'Resource', reward: 'Reward' };

  day.sections.forEach(function(sec, si) {
    html += '<div style="margin-bottom:28px">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">';
    html += '<div style="width:4px;height:20px;border-radius:2px;background:' + day.color + '"></div>';
    html += '<h2 style="font-size:16px;font-weight:700;color:var(--text);margin:0">' + sec.name + '</h2>';
    html += '<span style="font-size:11px;color:var(--text-muted)">(' + sec.items.length + ')</span>';
    html += '</div>';

    sec.items.forEach(function(item) {
      var vid = item.youtube ? extractVideoId(item.youtube) : null;
      var typeIcon = typeIcons[item.type] || '\uD83D\uDCCC';
      var typeColor = typeColors[item.type] || '#888';
      var typeLabel = typeLabels[item.type] || item.type;

      html += '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all 0.15s" onmouseover="this.style.background=\'rgba(255,255,255,0.06)\';this.style.borderColor=\'' + day.color + '44\'" onmouseout="this.style.background=\'rgba(255,255,255,0.03)\';this.style.borderColor=\'rgba(255,255,255,0.08)\'">';

      html += '<div style="display:flex;align-items:flex-start;gap:12px">';

      // Thumbnail or type icon
      if (vid) {
        html += '<div style="flex-shrink:0;width:120px;height:68px;border-radius:8px;overflow:hidden;position:relative">';
        html += '<img src="https://img.youtube.com/vi/' + vid + '/mqdefault.jpg" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML=\'<div style=padding:20px;text-align:center;background:rgba(255,255,255,0.05);height:100%;display:flex;align-items:center;justify-content:center;font-size:24px>' + typeIcon + '</div>\'">';
        html += '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div style="width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;font-size:12px">\u25B6</div></div>';

        html += '<div style="text-align:center"><div style="font-size:24px;margin-bottom:2px">\u25B6</div><div style="font-size:8px;color:' + typeColor + ';font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Coming Soon</div></div>';
        html += '</div>';
      } else {
        html += '<div style="flex-shrink:0;width:48px;height:48px;border-radius:10px;background:' + typeColor + '22;display:flex;align-items:center;justify-content:center;font-size:20px">' + typeIcon + '</div>';
      }

      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">';

      html += '<span style="font-size:10px;color:var(--text-muted)">' + item.id + '</span>';
      html += '</div>';
      html += '<div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px">' + item.title + '</div>';
      html += '<div style="font-size:12px;color:var(--text-muted);line-height:1.5">' + item.description + '</div>';
      html += '</div>';

      html += '</div></div>';
    });

    html += '</div>';
  });

  // Navigation
  html += '<div style="display:flex;gap:12px;margin-top:24px">';
  if (di > 0) {
    var prevDay = mod.days[di - 1];
    html += '<div class="next-step-card" onclick="selectDay(' + mi + ',' + (di-1) + ')" style="flex:1;margin:0">';
    html += '<div class="next-label">Previous</div>';
    html += '<div class="next-title">\u2190 ' + prevDay.icon + ' ' + (prevDay.day === 0 ? 'Challenge HQ' : 'Day ' + prevDay.day + ': ' + prevDay.title) + '</div>';
    html += '</div>';
  }
  if (di < mod.days.length - 1) {
    var nextDay = mod.days[di + 1];
    html += '<div class="next-step-card" onclick="selectDay(' + mi + ',' + (di+1) + ')" style="flex:1;margin:0">';
    html += '<div class="next-label">Next</div>';
    html += '<div class="next-title">' + nextDay.icon + ' Day ' + nextDay.day + ': ' + nextDay.title + ' \u2192</div>';
    html += '</div>';
  }
  html += '</div>';

  html += '</div>';
  main.innerHTML = html;
  main.scrollTop = 0;
}

function selectCategory(mi, ci) {
  var mod = MODULES[mi];
  var cat = mod.categories[ci];
  var main = document.getElementById('main-content');

  var html = '<div class="lesson-view">';
  html += '<div class="lesson-breadcrumb">' + mod.name + ' <span>\u2192 ' + cat.name + '</span></div>';
  html += '<h1 class="lesson-title">' + cat.name + '</h1>';
  html += '<p style="color:var(--text-muted);margin-bottom:32px;font-size:15px">' + cat.templates.length + ' templates available. Click any template to watch the video tutorial and download the workflow.</p>';

  html += '<div class="template-grid">';
  cat.templates.forEach(function(t) {
    var vid = extractVideoId(t.youtube);
    html += '<div class="template-card" onclick="openTemplate(\'' + t.id + '\',\'' + encodeURIComponent(t.title) + '\',\'' + t.level + '\',\'' + (vid || '') + '\',\'' + mi + '\',\'' + ci + '\')">';
    html += '<div class="tc-id">' + t.id + '</div>';
    html += '<div class="tc-name">' + t.title + '</div>';
    html += '<div class="tc-level">' + t.level + '</div>';
    html += '</div>';
  });
  html += '</div></div>';

  main.innerHTML = html;
  main.scrollTop = 0;
}

function openTemplate(id, titleEnc, level, videoId, mi, ci) {
  var title = decodeURIComponent(titleEnc);
  var main = document.getElementById('main-content');
  var mod = MODULES[mi];
  var cat = mod.categories[ci];

  var html = '<div class="lesson-view">';
  html += '<div class="lesson-breadcrumb">' + mod.name + ' \u2192 ' + cat.name + ' <span>\u2192 ' + id + '</span></div>';
  html += '<h1 class="lesson-title">' + title + '</h1>';
  html += '<div class="lesson-meta">';
  html += '<span class="meta-tag id">' + id + '</span>';
  html += '<span class="meta-tag level">' + level + '</span>';
  var isSkill = id.indexOf('SKILL-') === 0;
  var isCC = id.indexOf('CC-') === 0;
  if (videoId) html += '<span class="meta-tag video">\u25B6 Video</span>';
  if (isSkill) html += '<span class="meta-tag template">\u2B07 Skill File</span>';
  else html += '<span class="meta-tag template">\u2B07 Template</span>';
  html += '</div>';

  if (videoId) {
    html += '<div class="video-container">';
    html += '<a class="video-thumb" href="https://www.youtube.com/watch?v=' + videoId + '" target="_blank" rel="noopener">';
    html += '<img src="https://img.youtube.com/vi/' + videoId + '/maxresdefault.jpg" alt="' + title + '" onerror="this.src=\'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg\'">';
    html += '<div class="play-btn"></div>';
    html += '</a>';
    html += '</div>';
  } else if (isSkill) {
    html += '<div style="background:rgba(79,143,255,0.08);border:1px solid rgba(79,143,255,0.2);border-radius:12px;padding:32px;text-align:center;margin-bottom:24px">';
    html += '<div style="font-size:48px;margin-bottom:12px">\uD83E\uDDE0</div>';
    html += '<div style="font-size:14px;color:var(--text-muted);margin-bottom:16px">Copy this skill into your <code style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px">.claude/skills</code> directory</div>';
    html += '<div style="display:inline-block;padding:10px 24px;background:var(--accent);color:#fff;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer">\u2B07 Download Skill File</div>';
    html += '</div>';
  }

  html += '<div class="content-section"><h2><span class="section-icon">\uD83D\uDCE6</span> Resources</h2>';
  html += '<div class="resource-cards">';
  if (isSkill) {
    html += '<div class="resource-card"><div class="rc-icon">\uD83E\uDDE0</div><div class="rc-label">Claude Code Skill</div><div class="rc-name">' + title + ' \u2014 .md</div></div>';
  } else if (isCC) {
    html += '<div class="resource-card"><div class="rc-icon">\u25B6</div><div class="rc-label">Video Tutorial</div><div class="rc-name">' + title + '</div></div>';
  } else {
    html += '<div class="resource-card"><div class="rc-icon">\u2B07</div><div class="rc-label">n8n Template</div><div class="rc-name">' + title + ' \u2014 JSON</div></div>';
  }
  html += '</div></div>';

  html += '<div class="next-step-card" onclick="selectCategory(' + mi + ',' + ci + ')">';
  html += '<div class="next-label">Back</div>';
  html += '<div class="next-title">\u2190 Back to ' + cat.name + '</div>';
  html += '</div>';

  html += '</div>';
  main.innerHTML = html;
  main.scrollTop = 0;
}

function navigateToModule(mi) {
  var group = document.querySelector('.module-group[data-module="' + mi + '"]');
  if (group && !group.classList.contains('open')) group.classList.add('open');
  var mod = MODULES[mi];
  if (mod.isChallenge) {
    selectDay(mi, 0);
  } else if (mod.isSpecial === 'success-stories') {
    selectSpecial(mi, 'stories');
  } else if (mod.isSpecial) {
    selectSpecial(mi, mod.isSpecial);
  } else if (mod.lessons) {
    selectLesson(mi, 0);
  }
}

function selectSpecial(mi, section) {
  var mod = MODULES[mi];
  var main = document.getElementById('main-content');

  if (mod.isSpecial === 'upsell') {
    var c = mod.content;
    var html = '<div class="lesson-view" style="text-align:center;padding-top:60px">';

    c.features.forEach(function(f) { html += '<li>' + f + '</li>'; });

      html += '<div class="next-title">\uD83C\uDFC6 See Member Success Stories \u2192</div>';
      html += '</div>';
      html += '</div>';
    }

    html += '<div style="margin-top:32px;padding:20px;background:linear-gradient(135deg,#2d1a2a,#1a1a2e);border:1px solid rgba(167,139,250,0.3);border-radius:12px;display:inline-block;cursor:pointer">';
    html += '<div style="font-size:14px;font-weight:700;color:var(--purple)">Join AIS+ \u2192</div>';
    html += '</div>';
    html += '</div>';
    main.innerHTML = html;
    main.scrollTop = 0;
    return;
  }


  if (mod.isSpecial === 'podcast') {
    var html = '<div class="lesson-view">';
    html += '<div class="lesson-breadcrumb">' + mod.name + '</div>';
    html += '<h1 class="lesson-title">Nate Herk Podcast</h1>';
    html += '<p style="color:var(--text-muted);margin-bottom:32px;font-size:15px">Episodes on AI automation, building businesses, and the future of work.</p>';
    mod.episodes.forEach(function(ep) {
      if (ep.date === null) {
        // Coming soon placeholder
        html += '<div class="template-card" style="text-align:center;padding:32px">';
        html += '<div style="font-size:48px;margin-bottom:16px;opacity:0.4">\uD83C\uDFA7</div>';
        html += '<div class="tc-name" style="font-size:18px;margin-bottom:8px">Coming Soon</div>';
        html += '<div style="font-size:13px;color:var(--text-muted);line-height:1.6">' + ep.description + '</div>';
        html += '</div>';
      } else {
        html += '<div class="template-card" style="margin-bottom:8px">';
        html += '<div class="tc-id">' + ep.id + ' \u2014 ' + ep.date + '</div>';
        html += '<div class="tc-name">' + ep.title + '</div>';
        html += '<div style="font-size:12px;color:var(--text-muted);margin-top:4px">' + ep.description + '</div>';
        html += '</div>';
      }
    });
    html += '</div>';
    main.innerHTML = html;
    main.scrollTop = 0;
    return;
  }

  if (mod.isSpecial === 'discounts') {
    var html = '<div class="lesson-view">';
    html += '<div class="lesson-breadcrumb">' + mod.name + '</div>';
    html += '<h1 class="lesson-title">Partner Discount Codes</h1>';
    html += '<p style="color:var(--text-muted);margin-bottom:32px;font-size:15px">Exclusive discounts on tools used throughout the curriculum.</p>';
    html += '<div class="template-grid">';
    mod.discounts.forEach(function(d) {
      html += '<div class="template-card" onclick="window.open(\'' + d.url + '\', \'_blank\')">';
      html += '<div class="tc-id">' + d.id + '</div>';
      html += '<div class="tc-name">' + d.title + '</div>';
      html += '<div style="font-size:12px;color:var(--text-muted);margin:4px 0 10px">' + d.desc + '</div>';
      html += '<div style="font-size:12px;font-weight:600;color:var(--accent)">Get Discount \u2192</div>';
      html += '</div>';
    });
    html += '</div></div>';
    main.innerHTML = html;
    main.scrollTop = 0;
    return;
  }

  if (mod.isSpecial === 'success-stories') {
    var html = '<div class="lesson-view">';
    html += '<div class="lesson-breadcrumb">' + mod.name + '</div>';
    html += '<h1 class="lesson-title">AIS+ Success Stories</h1>';
    html += '<p style="color:var(--text-muted);margin-bottom:32px;font-size:15px">Real members. Real results. These builders were exactly where you are now.</p>';
    html += '<div class="template-grid">';
    mod.stories.forEach(function(s) {
      html += '<div class="template-card" onclick="window.open(\'' + s.skoolUrl + '\', \'_blank\')">';
      html += '<div style="font-size:28px;font-weight:800;color:var(--green);margin-bottom:8px">' + s.amount + '</div>';
      html += '<div class="tc-name">' + s.title + '</div>';
      html += '<div style="font-size:12px;color:var(--text-muted);margin:6px 0 10px;line-height:1.5">' + s.desc + '</div>';
      html += '<div style="font-size:12px;font-weight:600;color:var(--accent)">Watch Story \u2192</div>';
      html += '</div>';
    });
    html += '</div></div>';
    main.innerHTML = html;
    main.scrollTop = 0;
    return;

  // Discussions (refactored community)
  var html = '<div class="lesson-view">';
  html += '<div class="lesson-breadcrumb">' + mod.name + '</div>';

    html += '<p style="color:var(--text-muted);margin-bottom:24px">Engage with the community. Share your thoughts, learn from others.</p>';

  main.innerHTML = html;

function renderWelcome() {
  var main = document.getElementById('main-content');
  var totalTemplates = 0;
  MODULES.forEach(function(m) { if (m.isLibrary && !m.libraryType) m.categories.forEach(function(c) { totalTemplates += c.templates.length; }); });

  var totalLessons = 0;
  MODULES.forEach(function(m) { if (m.lessons) totalLessons += m.lessons.length; });

  var html = '<div class="welcome-view">';
  html += '<h1>AI Automation Society</h1>';
  html += '<div class="welcome-sub">Your structured path from zero to building and selling AI automations with Claude Code. Start with the fundamentals, build real projects in the 7-Day Challenge, then go deeper with mastery modules and templates.</div>';

  html += '<div class="stat-grid">';
  html += '<div class="stat-card"><div class="stat-num">10</div><div class="stat-label">Modules</div></div>';
  html += '<div class="stat-card"><div class="stat-num">' + totalLessons + '</div><div class="stat-label">Lessons</div></div>';
  html += '<div class="stat-card"><div class="stat-num">' + totalTemplates + '</div><div class="stat-label">Templates</div></div>';
  html += '<div class="stat-card"><div class="stat-num">7</div><div class="stat-label">Day Challenge</div></div>';
  html += '</div>';

  html += '<div class="reward-banner" style="max-width:500px;margin:0 auto 40px">';
  html += '<div class="reward-icon">\uD83C\uDFC6</div>';
  html += '<div class="reward-text">';
  html += '<div class="reward-title">7-Day Claude Code Builder Challenge</div>';
  html += '<div class="reward-desc">Complete all 7 days to unlock exclusive rewards. Build real projects with Claude Code + n8n.</div>';
  html += '</div>';
  html += '</div>';

  html += '<div class="roadmap"><h2>Your Learning Path</h2>';

  // Getting Started
  var gettingStarted = MODULES.filter(function(m) { return m.section === 'getting-started'; });
  html += '<div class="roadmap-phase"><h3>Getting Started</h3>';
  var globalNum = 1;
  gettingStarted.forEach(function(m) {
    var count = m.lessons ? m.lessons.length : 0;
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    if (m.hasReward) html += '<span class="ri-badge" style="background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)">\uD83C\uDFC6 Rewards</span>';
    html += '<div class="ri-count">' + count + ' lessons</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div>';

  // Core Curriculum
  var coreCurriculum = MODULES.filter(function(m) { return m.section === 'core-curriculum'; });
  html += '<div class="roadmap-phase"><h3>Core Curriculum</h3>';
  coreCurriculum.forEach(function(m) {
    var count = m.lessons ? m.lessons.length : m.isChallenge ? m.days.length + ' days, ' + m.days.reduce(function(s,d) { return s + d.sections.reduce(function(ss,sec) { return ss + sec.items.length; }, 0); }, 0) : m.isLibrary ? m.categories.reduce(function(s,c) { return s + c.templates.length; }, 0) : 0;
    var label = m.lessons ? 'lessons' : m.isChallenge ? 'items' : m.isLibrary ? 'items' : 'items';
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    if (m.hasReward) html += '<span class="ri-badge" style="background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)">\uD83C\uDFC6 Rewards</span>';
    html += '<div class="ri-count">' + count + ' ' + label + '</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div>';

  // Library & Resources
  var libraryResources = MODULES.filter(function(m) { return m.section === 'library-resources'; });
  html += '<div class="roadmap-phase"><h3>Library & Resources</h3>';
  libraryResources.forEach(function(m) {
    var count = m.isLibrary ? totalTemplates : m.isSpecial === 'podcast' ? m.episodes.length : m.isSpecial === 'discounts' ? m.discounts.length : m.isSpecial === 'discussions' ? m.discussions.length : 0;
    var label = m.isLibrary ? 'templates' : m.isSpecial === 'podcast' ? 'episodes' : m.isSpecial === 'discounts' ? 'codes' : m.isSpecial === 'discussions' ? 'discussions' : 'items';
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    html += '<div class="ri-count">' + count + ' ' + label + '</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div>';

  // AIS+ Membership
  var aisPlus = MODULES.filter(function(m) { return m.section === 'ais-plus'; });
  html += '<div class="roadmap-phase"><h3>AIS+ Membership</h3>';
  aisPlus.forEach(function(m) {
    var count = m.isSpecial === 'success-stories' ? m.stories.length : 1;
    var label = m.isSpecial === 'success-stories' ? 'stories' : 'items';
    var idx = MODULES.indexOf(m);
    html += '<div class="roadmap-item" onclick="toggleModule(' + idx + ')">';
    html += '<div class="ri-num">' + globalNum + '</div>';
    html += '<div class="ri-name">' + m.icon + ' ' + m.name + '</div>';
    if (m.isPaid) html += '<span class="ri-badge" style="background:rgba(167,139,250,0.15);color:var(--purple);border:1px solid rgba(167,139,250,0.3)">PAID</span>';
    html += '<div class="ri-count">' + count + ' ' + label + '</div>';
    html += '</div>';
    globalNum++;
  });
  html += '</div></div>';

  html += '</div>';
  main.innerHTML = html;
}

// =====================================================

renderSidebar();
renderWelcome();
